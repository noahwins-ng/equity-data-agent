# QNT-59 + QNT-123 + QNT-128 + QNT-129 / ADR-011: Groq (default) + Gemini 2.5 Flash (manual override).
#
# Agent code calls `equity-agent/default`. Setting EQUITY_AGENT_PROVIDER=gemini
# in the runtime env points get_llm() at `equity-agent/gemini` instead — config
# switch, no code change. Keys are resolved from env at proxy startup; the
# client (agent) does not need to know them.
#
# QNT-258 / ADR-025: default moved off Groq llama-3.3-70b to the paid DeepSeek
# V4 Flash primary (see the equity-agent/default block below), with the free
# OpenRouter anchor Nemotron 3 Ultra as its sole fallback.
#
# QNT-317 / ADR-026: the residual Groq free-tier fallback machinery was RETIRED
# ahead of Groq's 2026-06-17 decommission (llama-4-scout + qwen3-32b die
# 2026-07-17; llama-3.3-70b + llama-3.1-8b die 2026-08-16). ADR-026's verdict on
# the transitive fallback chain was REMOVE (residual): the paid primary + the
# decommission made these hops dead config. Deleted: the fallback-llama4scout
# alias (Scout) and the fallback-groq-gptoss120b alias that sat behind it in the
# small chain, plus the bench-llama4scout / bench-qwen3-32b / bench-llama3-70b
# aliases. The small tier was re-anchored to equity-agent/default (paid, no
# daily cap); gpt-oss-20b (small) and gpt-oss-120b (bench-gptoss120b) survive
# the decommission and stay. The earlier Cerebras gpt-oss-120b hop was already
# removed in QNT-227 (could not serve a 9-12k synthesize within the client
# timeout).
#
# QNT-129: bench-* aliases below are dedicated harness slots used by
# `python -m agent.evals --model equity-agent/bench-<name>` to compare
# free-tier candidates against the QNT-67 goldens. Per-alias rpm/tpm are
# set at ~80% of each provider's published free-tier caps so the proxy
# queues over-cap requests instead of returning 429 — the eval sweep sees
# latency, not failures. Bench aliases intentionally have NO fallbacks
# so each record's score reflects the model under test, not a silent
# fall-through. See docs/model-bench-2026-04.md for the bench output and
# the revisit cadence.

model_list:
  - model_name: equity-agent/default
    # QNT-258 / ADR-025: paid primary for the public launch. Moved OFF Groq
    # llama-3.3-70b (free-tier 100K TPD ceiling was the binding launch
    # constraint) to DeepSeek V4 Flash via OpenRouter (paid: $0.09/$0.18 per M,
    # ~$0.002/chat, 1M ctx, non-reasoning, structured-outputs capable — already
    # exercised as the QNT-275 DeepEval judge). The whole Groq chain ADR-021
    # calibrated is being retired by Groq's 2026-06-17 decommission (scout
    # 07/17, 70b 08/16), so a same-provider billing flip was not available.
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      # QNT-258: DeepSeek V4 Flash on OpenRouter defaults to REASONING ON (emits
      # 37-89 CoT tokens/call even at reasoning_effort:low), which the ticket's
      # "non-reasoning" premise missed. Reasoning-on caused a degenerate bench
      # (30min vs ~3min), intermittent empty completions when CoT ate the token
      # budget, and uniform narrate grounding misses. Disabling it (verified:
      # reasoning_tokens -> 0, clean content) restores the fast non-reasoning
      # model the ADR-025 economics assume. See ADR-025.
      extra_body:
        reasoning:
          enabled: false
        # QNT-318 / ADR-027: prefix caching. `deepseek-v4-flash` is served on
        # OpenRouter by ~16 providers, EACH with its own KV cache, and by
        # default OpenRouter load-balances across them — so consecutive
        # synthesize calls hit different providers and the large stable prefix
        # (SYSTEM_PROMPT + force-injected reports) never reuses a warm cache
        # (measured: cached_tokens=0 unpinned). Pinning an ORDERED preference
        # makes routing sticky to the first available provider, so its prefix
        # cache warms and stays warm (measured live: Novita 100% cached prefix,
        # 9,472/9,487 tokens, stable across calls). `allow_fallbacks: false`
        # keeps routing inside this curated top-6 set (by OpenRouter token
        # share). Order puts the three privacy-compliant providers FIRST
        # (novita/deepinfra/gmicloud) so caching happens there; the three
        # data-retaining providers (deepseek/alibaba/baidu) sit last as deep
        # resilience only. `data_collection: allow` scopes the privacy
        # relaxation to THIS alias (user decision, ADR-027 — the public-equity
        # chat carries no PII; ADR-017), leaving the account default strict for
        # the eval judge and every other alias. Cache reads bill ~0.2x input on
        # these providers, cutting the input-dominated bill (ADR-026, ~12:1).
        provider:
          order:
            - novita
            - deepinfra
            - gmicloud
            - deepseek
            - alibaba
            - baidu
          allow_fallbacks: false
          data_collection: allow
      # QNT-223 (#12) / ADR-021: bound the throttled tail — carried forward. A
      # throttled primary call is aborted at 45s and falls through to the
      # fallback anchor (fallback-nemotron-ultra) within the SAME client call,
      # bounding worst-case turn wall-clock to ~48s (< the 60s client timeout,
      # so no client retry). 45s sits well above normal synthesize/narrate
      # (~5-20s) so only genuine throttle trips it. Bench aliases set no timeout.
      timeout: 45

  # ─── QNT-258 / ADR-025: OpenRouter fallback anchor ──────────
  # The paid DeepSeek primary rarely fails, but when it 429s/throttles/times
  # out the chain must still serve. Groq no longer offers a free
  # synthesize-capable host (post-decommission every survivor caps at 8000 TPM
  # -> 413 on a 9-12k synthesize), so the anchor is a free OpenRouter model.
  # This overrides the ticket's "free models are bench-only" guidance FOR THE
  # FALLBACK SLOT ONLY (user decision, ADR-025): the primary stays paid, and
  # this free hop carries only the small residual traffic the paid model
  # dropped. Free-tier caveats (shared RPM/RPD caps, train-on-prompts, ephemeral
  # capacity) are acceptable for a rare fallback but NOT for primary.
  #
  # Laguna M.1 was evaluated as a second anchor and DROPPED (QNT-258 review):
  # poolside/laguna-m.1:free returned upstream 429s and empty completions on a
  # live smoke test, so a known-flaky last hop only added retry latency before
  # the deterministic fallback. Nemotron alone is the anchor; if it also fails,
  # graph.py _structured_call returns None and the caller degrades (fail-closed).
  - model_name: equity-agent/fallback-nemotron-ultra
    # Anchor: NVIDIA Nemotron 3 Ultra (550B), 1M ctx, structured-outputs CAPABLE
    # — so it serves BOTH the free-text narrate AND the array-bounded ThesisPlan
    # synthesize (the schema Cerebras was rejected on, QNT-227). Verified live
    # (QNT-258): clean completion, finish_reason=stop.
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # QNT-317 / ADR-026: equity-agent/fallback-llama4scout (Scout, dies 07/17) and
  # equity-agent/fallback-groq-gptoss120b (its downstream hop) were REMOVED here
  # — the residual Groq free-tier chain the ADR-026 dividend retires. The small
  # tier now falls back to the paid equity-agent/default (see fallbacks below).

  - model_name: equity-agent/gemini
    litellm_params:
      # QNT-123: Pro returns `limit: 0` on Google AI Studio free tier as of
      # 2026-04-23. Flash (15 RPM / 1500 RPD) is free-tier-reachable and
      # preserves the "free to clone" invariant from ADR-011. Pro remains a
      # one-line YAML edit away if a paid Gemini plan is added.
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: equity-agent/small
    # QNT-220 (#7): per-node tiering small alias. classify / plan run on this
    # fast/small model; synthesize / narrate keep equity-agent/default (70b).
    # gpt-oss-20b is Groq free-tier (TPD-budgeted, not the 20-req/DAY ceiling
    # that made gemini-2.5-flash non-viable for the hot path) and is
    # prompt-cache-capable on Groq (only gpt-oss models cache), aligning with
    # the QNT-223 cache direction. Falls back to the 70b default on Groq TPD
    # exhaustion so a 429 degrades cost, not function.
    litellm_params:
      model: groq/openai/gpt-oss-20b
      api_key: os.environ/GROQ_API_KEY
      reasoning_effort: low

  # ─── QNT-129 bench aliases ──────────────────────────────────
  # Caps below are 80% of published free-tier limits. Format:
  # rpm = published_rpm × 0.8, tpm = published_tpm × 0.8 (or omitted
  # when the provider publishes "unlimited TPM").

  - model_name: equity-agent/bench-gptoss120b
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
      rpm: 25       # ~80% of Groq published 30 RPM (rounded to nearest 5)
      tpm: 6500     # ~80% of Groq published 8K TPM (rounded to nearest 500)

  - model_name: equity-agent/bench-cerebras-gptoss120b
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY
      reasoning_effort: low
      extra_headers:
        User-Agent: equity-data-agent-litellm/1.0

  # QNT-275: paid OpenRouter judge for the DeepEval RAGAS suite. The free-tier
  # judges have a ~1M-token/day ceiling that caps a fixed-judge run at ~20-35
  # records; DeepSeek V4 Flash on OpenRouter removes it -- a >=50-record baseline
  # runs in one clean window for ~$0.18 ($0.089/$0.224 per M in/out, 1M ctx,
  # structured-outputs + reproducible). reasoning_effort: low strips the CoT token
  # sink (verdict tasks don't need it). Used ONLY by the DeepEval judge
  # (agent.evals.deepeval_eval); the dialogue / golden judge stays on the free
  # bench-cerebras alias above. Pinned for reproducible scores (ADR-023).
  - model_name: equity-agent/bench-deepseek-v4-flash
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.0
      # QNT-258: fully disable reasoning (was reasoning_effort: low, which still
      # emitted 37-89 CoT tokens/call). Aligns with ADR-023's "verdict tasks
      # don't need CoT" for the DeepEval judge AND makes this bench alias match
      # the reasoning-off config the equity-agent/default primary now ships.
      extra_body:
        reasoning:
          enabled: false

  - model_name: equity-agent/bench-gptoss20b
    litellm_params:
      model: groq/openai/gpt-oss-20b
      api_key: os.environ/GROQ_API_KEY
      rpm: 25
      tpm: 6500

  # QNT-317 / ADR-026: bench-llama4scout (Scout) and bench-qwen3-32b both die
  # 2026-07-17 in the Groq decommission — retired, not re-pointed (their models
  # are gone). Surviving bench slots (gptoss120b/gptoss20b/gemma/gemini) remain.

  - model_name: equity-agent/bench-gemma4-31b
    litellm_params:
      model: gemini/gemma-4-31b-it
      api_key: os.environ/GEMINI_API_KEY
      rpm: 12       # Google published 15 RPM; TPM unlimited so omitted

  - model_name: equity-agent/bench-gemma3-27b
    litellm_params:
      model: gemini/gemma-3-27b-it
      api_key: os.environ/GEMINI_API_KEY
      rpm: 25       # Google published 30 RPM
      tpm: 12000    # Google published 15K TPM

  - model_name: equity-agent/bench-gemini31flashlite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: os.environ/GEMINI_API_KEY
      rpm: 12       # Google published 15 RPM
      tpm: 200000   # Google published 250K TPM

  # QNT-317 / ADR-026: bench-llama3-70b (the old production-default calibration
  # line, groq/llama-3.3-70b-versatile) dies 2026-08-16 in the Groq decommission
  # and is no longer the default anyway (QNT-258 moved default to paid DeepSeek).
  # Retired — bench-deepseek-v4-flash is the current-primary calibration line.

litellm_settings:
  drop_params: true
  # Auto-failover on 429 / throttle / per-model timeout. QNT-258 / ADR-025:
  # equity-agent/default (now paid DeepSeek V4 Flash) falls through to the free
  # OpenRouter anchor Nemotron 3 Ultra (structured-outputs capable, so it serves
  # both synthesize and narrate). The paid primary has no daily cap, so this
  # anchor fires rarely; if it also fails the node degrades to its deterministic
  # fallback (fail-closed). (Laguna M.1 was dropped in review — see the anchor
  # comment above.) `equity-agent/gemini` and the bench aliases stay direct so
  # opting in is always an explicit choice.
  fallbacks:
    - equity-agent/default:
        - equity-agent/fallback-nemotron-ultra
    # QNT-220 (#7): small tier (Groq gpt-oss-20b, survives the decommission)
    # falls back to the default on provider throttle so classify/plan stay
    # functional. QNT-317 / ADR-026: re-anchored here — the old Scout hop
    # (fallback-llama4scout, dies 07/17) and its gpt-oss-120b tail were removed;
    # the paid equity-agent/default (no daily cap) is the terminal fallback, and
    # since fallbacks are recursive it inherits default's own nemotron anchor.
    - equity-agent/small:
        - equity-agent/default
