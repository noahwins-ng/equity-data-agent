# QNT-59 + QNT-123 + QNT-128 + QNT-129 / ADR-011: Groq (default) + Gemini 2.5 Flash (manual override).
#
# Agent code calls `equity-agent/default`. Setting EQUITY_AGENT_PROVIDER=gemini
# in the runtime env points get_llm() at `equity-agent/gemini` instead — config
# switch, no code change. Keys are resolved from env at proxy startup; the
# client (agent) does not need to know them.
#
# QNT-128/QNT-129: default stays Llama-3.3-70B (Groq free-tier TPD 100K) with
# Llama-4-Scout-17B as auto-fallback (TPD 500K), then Groq-hosted gpt-oss-120b
# as a last-resort same-provider fallback for eval/dev days where both Llama
# buckets are exhausted. This is capacity insurance, not a quality promotion;
# Scout remains the preferred fallback.
#
# QNT-227: the Cerebras gpt-oss-120b fallback (added QNT-215) was REMOVED. A
# controlled run (ADR-021 follow-up) showed Cerebras cannot serve the 9-12k-token
# synthesize request within the 60s client timeout (0/4 trials; client retries
# stacked to ~181s before erroring -- the exact unbounded tail ADR-021 set out
# to kill). litellm fallbacks are recursive, so the array-bounded ThesisPlan
# schema also reached Cerebras and was rejected. It served no call it could be
# reached for, so it was pure tail-latency risk and is gone from every chain.
#
# Why Scout over Qwen: the QNT-129 free-tier bench
# (docs/model-bench-2026-04.md) ran 16-record golden sweeps on every
# plausible Groq + Google AI Studio free-tier model. Qwen3-32B produced
# 12/16 hallucination_ok (4 records with invented magnitudes — AAPL P/E,
# JPM EPS, UNH headlines) plus a Groq tool-use failure on the META
# synthesize call. Scout produced 16/16 on every measure (judge 4.94 vs
# 1.44, cosine 0.342 vs 0.296, p50 elapsed 836ms vs 25 635ms — 30× faster
# wall time). Same provider, same key, same retry path, no new failure
# mode added.
#
# Why not Scout-default-too: bench is 16 records on one prompt revision.
# Llama-3.3-70B has months of production track record; Scout has zero.
# Holding Scout in the fallback slot lets us collect production telemetry
# before promoting; re-evaluate at the next bench run (target +2 weeks
# from QNT-129 ship).
#
# QNT-129: bench-* aliases below are dedicated harness slots used by
# `python -m agent.evals --model equity-agent/bench-<name>` to compare
# free-tier candidates against the QNT-67 goldens. Per-alias rpm/tpm are
# set at ~80% of each provider's published free-tier caps so the proxy
# queues over-cap requests instead of returning 429 — the eval sweep sees
# latency, not failures. Bench aliases intentionally have NO fallbacks
# so each record's score reflects the model under test, not a silent
# fall-through. See docs/model-bench-2026-04.md for the bench output and
# the revisit cadence.

model_list:
  - model_name: equity-agent/default
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      # QNT-223 (#12) / ADR-021: bound the throttled tail. The 14-day baseline
      # had synthesize max 117.5s — a throttled Groq call that ChatOpenAI
      # (max_retries=2 x 60s LLM_REQUEST_TIMEOUT) retried to ~120s instead of
      # rerouting. This per-model timeout makes the proxy abort a throttled
      # llama-3.3-70b call at 45s and fall through to fallback-llama4scout
      # (benched 16/16) within the SAME client call, bounding worst-case turn
      # wall-clock to ~48s (< the 60s client timeout, so no client retry).
      # 45s sits well above normal synthesize/narrate (~5-20s) so only genuine
      # throttle trips it. Bench/eval aliases set no timeout and are unaffected.
      timeout: 45

  - model_name: equity-agent/fallback-llama4scout
    # QNT-129: replaces the previous `equity-agent/fallback-qwen3`. Same
    # provider (Groq), same TPD ceiling (500K — 5× the default), strictly
    # better on every measured signal vs Qwen3-32B. See
    # docs/model-bench-2026-04.md for the rationale.
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY

  - model_name: equity-agent/fallback-groq-gptoss120b
    # QNT-215: final same-provider fallback behind Scout (QNT-227 removed the
    # Cerebras hop that used to sit in front of it). The QNT-129 bench found
    # gpt-oss-120b safe on hard contracts but too defensive for primary thesis
    # quality, so keep it behind the stronger Llama fallback. Note: its 8000-TPM
    # per-request ceiling means it cannot serve a 9-12k synthesize either (it
    # fast-fails with a 413 rather than hanging); it still serves the small
    # plan/classify calls fine.
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
      reasoning_effort: low

  - model_name: equity-agent/gemini
    litellm_params:
      # QNT-123: Pro returns `limit: 0` on Google AI Studio free tier as of
      # 2026-04-23. Flash (15 RPM / 1500 RPD) is free-tier-reachable and
      # preserves the "free to clone" invariant from ADR-011. Pro remains a
      # one-line YAML edit away if a paid Gemini plan is added.
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: equity-agent/small
    # QNT-220 (#7): per-node tiering small alias. classify / plan run on this
    # fast/small model; synthesize / narrate keep equity-agent/default (70b).
    # gpt-oss-20b is Groq free-tier (TPD-budgeted, not the 20-req/DAY ceiling
    # that made gemini-2.5-flash non-viable for the hot path) and is
    # prompt-cache-capable on Groq (only gpt-oss models cache), aligning with
    # the QNT-223 cache direction. Falls back to the 70b default on Groq TPD
    # exhaustion so a 429 degrades cost, not function.
    litellm_params:
      model: groq/openai/gpt-oss-20b
      api_key: os.environ/GROQ_API_KEY
      reasoning_effort: low

  # ─── QNT-129 bench aliases ──────────────────────────────────
  # Caps below are 80% of published free-tier limits. Format:
  # rpm = published_rpm × 0.8, tpm = published_tpm × 0.8 (or omitted
  # when the provider publishes "unlimited TPM").

  - model_name: equity-agent/bench-gptoss120b
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
      rpm: 25       # ~80% of Groq published 30 RPM (rounded to nearest 5)
      tpm: 6500     # ~80% of Groq published 8K TPM (rounded to nearest 500)

  - model_name: equity-agent/bench-cerebras-gptoss120b
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY
      reasoning_effort: low
      extra_headers:
        User-Agent: equity-data-agent-litellm/1.0

  # QNT-275: paid OpenRouter judge for the DeepEval RAGAS suite. The free-tier
  # judges have a ~1M-token/day ceiling that caps a fixed-judge run at ~20-35
  # records; DeepSeek V4 Flash on OpenRouter removes it -- a >=50-record baseline
  # runs in one clean window for ~$0.18 ($0.089/$0.224 per M in/out, 1M ctx,
  # structured-outputs + reproducible). reasoning_effort: low strips the CoT token
  # sink (verdict tasks don't need it). Used ONLY by the DeepEval judge
  # (agent.evals.deepeval_eval); the dialogue / golden judge stays on the free
  # bench-cerebras alias above. Pinned for reproducible scores (ADR-023).
  - model_name: equity-agent/bench-deepseek-v4-flash
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.0
      reasoning_effort: low

  - model_name: equity-agent/bench-gptoss20b
    litellm_params:
      model: groq/openai/gpt-oss-20b
      api_key: os.environ/GROQ_API_KEY
      rpm: 25
      tpm: 6500

  - model_name: equity-agent/bench-llama4scout
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY
      rpm: 25
      tpm: 24000    # Groq published 30K TPM — wide TPM is the headroom here

  - model_name: equity-agent/bench-qwen3-32b
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
      rpm: 50       # Groq published 60 RPM
      tpm: 5000     # Groq published 6K TPM — TPM is the binding constraint

  - model_name: equity-agent/bench-gemma4-31b
    litellm_params:
      model: gemini/gemma-4-31b-it
      api_key: os.environ/GEMINI_API_KEY
      rpm: 12       # Google published 15 RPM; TPM unlimited so omitted

  - model_name: equity-agent/bench-gemma3-27b
    litellm_params:
      model: gemini/gemma-3-27b-it
      api_key: os.environ/GEMINI_API_KEY
      rpm: 25       # Google published 30 RPM
      tpm: 12000    # Google published 15K TPM

  - model_name: equity-agent/bench-gemini31flashlite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: os.environ/GEMINI_API_KEY
      rpm: 12       # Google published 15 RPM
      tpm: 200000   # Google published 250K TPM

  - model_name: equity-agent/bench-llama3-70b
    # Calibration line — same model as `equity-agent/default` but no fallback
    # so the bench measures Llama-3.3-70B's own quality on the current
    # prompt_version. The QNT-128 reference run was on an older prompt
    # (1318d12a6d); without this alias the comparison would be unfair to
    # every other candidate on the post-QNT-133/QNT-136/QNT-137 prompt.
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      rpm: 25       # ~80% of Groq published 30 RPM on 70B (rounded to nearest 5)
      tpm: 5000     # ~80% of Groq published 6K TPM on 70B free tier (rounded to nearest 500)

litellm_settings:
  drop_params: true
  # Auto-failover on 429 (rate limit) — when Llama-3.3-70B exhausts its
  # 100K TPD, requests transparently switch to Llama-4-Scout (500K TPD),
  # then Groq-hosted gpt-oss-120b as the last same-provider fallback.
  # (QNT-227 dropped the Cerebras hop that used to sit between them: it
  # could not serve synthesize within the client timeout — see top-of-file.)
  # `equity-agent/gemini` and the bench aliases stay direct so opting in is
  # always an explicit choice.
  fallbacks:
    - equity-agent/default:
        - equity-agent/fallback-llama4scout
        - equity-agent/fallback-groq-gptoss120b
    # QNT-220 (#7): small tier falls back to the 70b default on Groq TPD
    # exhaustion -- classify/plan stay functional, just lose the cost win.
    - equity-agent/small:
        - equity-agent/default
        - equity-agent/fallback-llama4scout
    - equity-agent/fallback-llama4scout:
        - equity-agent/fallback-groq-gptoss120b
