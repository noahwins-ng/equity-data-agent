# SOPS config — encryption rules for .env secrets at rest.
#
# The `age` recipient below is the public half of the project's deploy key.
# The private half lives in two places only:
#   1. Noah's escrow store (Apple Notes locked entry "equity-data-agent / sops age key";
#      a password manager like Bitwarden or 1Password works equivalently — the
#      requirement is "survives laptop loss + independent of the GH secret").
#   2. GitHub Actions secret `SOPS_AGE_KEY` (consumed by .github/workflows/deploy.yml).
#
# To rotate the recipient, see docs/guides/hetzner-bootstrap.md §"SOPS rotation".
creation_rules:
  - path_regex: \.env(\.sops)?$
    input_type: dotenv
    output_type: dotenv
    # REPLACE BEFORE FIRST ENCRYPT: run `age-keygen -o ~/.config/sops/age/keys.txt`,
    # copy the `# public key: age1...` line's value here, then `sops -e .env > .env.sops`.
    age: age170yr3ewzzj5hhw38whred8jtzaje9syhvwmxmutff8au6rkj3gxqj0jhpq
