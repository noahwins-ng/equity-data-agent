name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget -q --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Unit tests
        # Exit code 5 = no tests collected; treat as success during bootstrap
        run: uv run pytest -m "not integration" || [ $? -eq 5 ]

      - name: Integration tests
        run: uv run pytest -m integration -v
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
