name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test
        # Exit code 5 = no tests collected; treat as success during bootstrap
        run: uv run pytest || [ $? -eq 5 ]
