name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GIT_SHA
          script: |
            set -euo pipefail
            cd /opt/equity-data-agent
            # QNT-109: Mark the deploy window open so docker-events-notify.sh
            # suppresses expected churn (container recreates from GIT_SHA change
            # + image rebuild). The sentinel is removed by the cleanup step
            # below once verify has run. Stale sentinels (>10 min) are ignored
            # by the notifier, so a crashed deploy can't silently mute alerts.
            touch .deploy-in-progress
            # Ensure working tree is clean so git pull can't silently abort on SCP'd hotfixes.
            # If this fails, fix it manually — do NOT mask drift behind a passing deploy.
            # Note: .deploy-in-progress is a deploy-side artifact, so exclude it from the check.
            git diff --quiet -- ':!.deploy-in-progress' && git diff --cached --quiet -- ':!.deploy-in-progress' || { echo "::error::Prod working tree has uncommitted changes; aborting deploy."; git status; exit 1; }
            git pull origin main
            # GIT_SHA is read by the api service in docker-compose.yml and surfaced
            # on /health so external monitoring can distinguish "up" from "up and
            # running the expected commit" (QNT-51 — the runtime counterpart to
            # the CD SHA gate in QNT-88).
            export GIT_SHA
            docker compose --profile prod up -d --build

      - name: Verify prod SHA matches merged commit
        uses: appleboy/ssh-action@v1
        env:
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: EXPECTED_SHA
          script: |
            set -euo pipefail
            REMOTE_SHA=$(cd /opt/equity-data-agent && git rev-parse HEAD)
            if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
              echo "::error::Prod at $REMOTE_SHA, expected $EXPECTED_SHA — deploy did not update the code"
              exit 1
            fi
            echo "Prod at expected SHA: $REMOTE_SHA"

      - name: Verify deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "Waiting for API to come up..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Deploy verified OK"
                exit 0
              fi
              echo "Attempt $i/12 — retrying in 5s..."
              sleep 5
            done
            echo "API health check failed after 60s"
            exit 1

      - name: Verify Dagster loaded expected asset graph
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            docker exec equity-data-agent-dagster-daemon-1 python -c "
            from dagster_pipelines.definitions import defs
            ag = defs.resolve_asset_graph()
            n = len(ag.get_all_asset_keys())
            c = len(list(ag.asset_check_keys))
            s = len(list(defs.schedules))
            assert n >= 8, f'expected >=8 assets, got {n}'
            assert c >= 17, f'expected >=17 asset checks, got {c}'
            assert s >= 2, f'expected >=2 schedules, got {s}'
            print(f'OK: assets={n} checks={c} schedules={s}')
            "

      - name: Close deploy window (remove notifier sentinel)
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # QNT-109: always remove the sentinel, even on failed deploys.
            # If this step is skipped entirely, the notifier's stale-sentinel
            # check (>10 min = fail-open) ensures alerts resume automatically.
            rm -f /opt/equity-data-agent/.deploy-in-progress
