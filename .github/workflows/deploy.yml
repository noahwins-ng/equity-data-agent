name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decrypt .env.sops and install on Hetzner
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          # QNT-102: decrypt .env.sops in CI (not on VPS) so the age private key
          # never lands on prod disk. The plaintext .env file does still live on
          # the VPS at rest — docker compose needs it to read env vars — but the
          # authoritative source is the SOPS-encrypted ciphertext in git, and
          # rotation is now a repo workflow instead of hand-editing prod.
          set -euo pipefail

          # Match the local sops version (visible as `sops_version=` in .env.sops
          # metadata) so any format change between releases is a non-issue. Bump
          # in lockstep with `brew upgrade sops` on dev machines.
          SOPS_VERSION=3.12.2
          curl -sSLo /tmp/sops.deb \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops_${SOPS_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/sops.deb
          sops --version

          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

          # --input-type/--output-type: `.env.sops` ends in `.sops` which sops
          # doesn't recognise as dotenv; without explicit flags the decrypter
          # defaults to JSON parsing and fails on the first `#` comment.
          sops -d --input-type dotenv --output-type dotenv .env.sops > .env.decrypted
          chmod 600 .env.decrypted
          # Sanity: decrypted payload must look like a dotenv file. If the key
          # rotated without re-encrypting .env.sops we'd see garbage or empty
          # output — better to fail loud before shipping it to prod.
          if ! grep -q '^[A-Z_][A-Z0-9_]*=' .env.decrypted; then
            echo "::error::Decrypted .env does not look like a dotenv file (no KEY=value lines found)"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Don't swallow keyscan errors — if it fails (DNS, port 22 blocked),
          # surface the cause here rather than as a cryptic "Host key
          # verification failed" from scp two lines down.
          if ! ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed for $HETZNER_HOST — check DNS/firewall before retrying"
            exit 1
          fi

          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            .env.decrypted "$HETZNER_USER@$HETZNER_HOST:/opt/equity-data-agent/.env.decrypted"
          ssh -i ~/.ssh/id_deploy "$HETZNER_USER@$HETZNER_HOST" '
            set -euo pipefail
            cd /opt/equity-data-agent
            mv -f .env.decrypted .env
            chmod 600 .env
            chown root:root .env
          '

          # Runner is ephemeral but scrub anyway — defence in depth.
          shred -u .env.decrypted ~/.config/sops/age/keys.txt ~/.ssh/id_deploy 2>/dev/null || \
            rm -f .env.decrypted ~/.config/sops/age/keys.txt ~/.ssh/id_deploy

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GIT_SHA
          script: |
            set -euo pipefail
            cd /opt/equity-data-agent
            # QNT-109: Mark the deploy window open so docker-events-notify.sh
            # suppresses expected churn (container recreates from GIT_SHA change
            # + image rebuild). The sentinel is removed by the cleanup step
            # below once verify has run. Stale sentinels (>10 min) are ignored
            # by the notifier, so a crashed deploy can't silently mute alerts.
            touch .deploy-in-progress
            # Ensure working tree is clean so git pull can't silently abort on SCP'd hotfixes.
            # If this fails, fix it manually — do NOT mask drift behind a passing deploy.
            # Note: .deploy-in-progress is a deploy-side artifact, so exclude it from the check.
            git diff --quiet -- ':!.deploy-in-progress' && git diff --cached --quiet -- ':!.deploy-in-progress' || { echo "::error::Prod working tree has uncommitted changes; aborting deploy."; git status; exit 1; }
            # QNT-124: capture the pre-pull SHA so the post-`up -d` restart step
            # can compute the correct diff window even when multiple commits
            # land in one pull (e.g., back-to-back merges to main while a deploy
            # is in flight). HEAD~1..HEAD would silently skip the older commits'
            # config changes — the same class of latent stale-deploy bug this
            # ticket exists to close.
            git rev-parse HEAD > /tmp/equity-data-agent-prev-sha
            git pull origin main
            # GIT_SHA is read by the api service in docker-compose.yml and surfaced
            # on /health so external monitoring can distinguish "up" from "up and
            # running the expected commit" (QNT-51 — the runtime counterpart to
            # the CD SHA gate in QNT-88).
            export GIT_SHA
            # --remove-orphans drops containers from services no longer in the
            # active profile — e.g. the QNT-75 move of `caddy` to the dormant
            # `prod-caddy` profile. Without this, the orphaned container keeps
            # running and holding ports until manual cleanup.
            docker compose --profile prod up -d --build --remove-orphans

      - name: Run ClickHouse migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # QNT-146: apply every migrations/*.sql against prod ClickHouse on
            # every deploy. All migration files use idempotent DDL (CREATE …
            # IF NOT EXISTS, ADD COLUMN IF NOT EXISTS), so re-applying is a
            # no-op when nothing changed and removes the manual `make migrate`
            # gate that bit us in QNT-134 (sma_200/adx_14/revenue_ttm columns
            # missing in prod after PR #152, 60+ min recovery).
            #
            # `--fail` makes curl exit non-zero on HTTP error responses (4xx/5xx),
            # `set -euo pipefail` aborts the loop on the first failure, and the
            # explicit `exit 1` surfaces it as a CD failure rather than a silent
            # log line. Don't downgrade to `make migrate` here — the Makefile
            # target swallows errors with `|| echo " FAILED"`, which is fine for
            # interactive dev but defeats the CD gate.
            set -euo pipefail
            shopt -s nullglob   # empty migrations dir → loop runs zero times instead of with the literal glob
            cd /opt/equity-data-agent

            # Wait for ClickHouse to accept traffic. Normally already healthy
            # before this step (the image isn't rebuilt on most deploys), but
            # if the CH tag ever bumps, `docker compose up -d --build` restarts
            # it and we'd fire curl mid-startup. healthcheck.start_period is
            # 60s; budget 90s here for headroom.
            for i in $(seq 1 45); do
              if curl -sf http://localhost:8123/ping > /dev/null; then break; fi
              if [ "$i" -eq 45 ]; then echo "::error::ClickHouse not ready after 90s"; exit 1; fi
              sleep 2
            done

            applied=0
            for f in migrations/*.sql; do
              echo "=== $f ==="
              curl -s --fail --data-binary @"$f" http://localhost:8123/ \
                || { echo "::error::Migration $f failed"; exit 1; }
              applied=$((applied + 1))
            done
            echo "All $applied migrations applied (or already in place)"

      - name: Restart services with changed bind-mounted configs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/equity-data-agent

            # QNT-124: docker compose up -d only recreates a container when its
            # *compose service definition* changes (image, command, env_file,
            # environment) — NOT when a bind-mounted file on disk changes. The
            # services below read their config at startup with no hot-reload, so
            # `git pull` updates the file but the running process keeps the old
            # one (see QNT-123 incident: stale Pro-model 429s after a Pro→Flash
            # config change).
            #
            # PREV_SHA is captured in the Deploy step BEFORE `git pull origin
            # main` (see /tmp/equity-data-agent-prev-sha) so the diff window is
            # correct even if the pull brought in multiple commits at once
            # (back-to-back merges with deploys queued). HEAD~1..HEAD would only
            # see the most recent commit and silently miss the rest.
            PREV_SHA=$(cat /tmp/equity-data-agent-prev-sha)
            rm -f /tmp/equity-data-agent-prev-sha
            CHANGED=$(git diff --name-only "$PREV_SHA" HEAD)

            restarted_any=0
            restart_if_changed() {
              local file="$1"; shift
              local -a services=("$@")
              if printf '%s\n' "$CHANGED" | grep -qx "$file"; then
                echo "[QNT-124] $file changed — docker compose restart ${services[*]}"
                docker compose --profile prod restart "${services[@]}"
                restarted_any=1
              fi
            }

            restart_if_changed "litellm_config.yaml" litellm
            restart_if_changed "dagster.yaml" dagster dagster-code-server dagster-daemon
            restart_if_changed "workspace.yaml" dagster dagster-daemon
            # NOTE: Caddyfile restart is intentionally omitted while caddy lives
            # in the dormant `prod-caddy` profile (QNT-75 / ADR-018). The
            # `--profile prod restart caddy` call would silently no-op because
            # compose with `--profile prod` doesn't see `prod-caddy` services,
            # masking a real Caddyfile change. Re-add this line (with the
            # appropriate profile flag) when the caddy + custom-domain upgrade
            # path is activated.

            if [ "$restarted_any" = 0 ]; then
              echo "[QNT-124] no bind-mounted config files changed — no restarts needed"
            fi

      - name: Verify prod SHA matches merged commit
        uses: appleboy/ssh-action@v1
        env:
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: EXPECTED_SHA
          script: |
            set -euo pipefail
            REMOTE_SHA=$(cd /opt/equity-data-agent && git rev-parse HEAD)
            if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
              echo "::error::Prod at $REMOTE_SHA, expected $EXPECTED_SHA — deploy did not update the code"
              exit 1
            fi
            echo "Prod at expected SHA: $REMOTE_SHA"

      - name: Verify deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "Waiting for API to come up..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Deploy verified OK"
                exit 0
              fi
              echo "Attempt $i/12 — retrying in 5s..."
              sleep 5
            done
            echo "API health check failed after 60s"
            exit 1

      - name: Verify Dagster loaded expected asset graph
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            docker exec equity-data-agent-dagster-daemon-1 python -c "
            from dagster_pipelines.definitions import defs
            ag = defs.resolve_asset_graph()
            n = len(ag.get_all_asset_keys())
            c = len(list(ag.asset_check_keys))
            s = len(list(defs.schedules))
            assert n >= 8, f'expected >=8 assets, got {n}'
            assert c >= 17, f'expected >=17 asset checks, got {c}'
            assert s >= 2, f'expected >=2 schedules, got {s}'
            print(f'OK: assets={n} checks={c} schedules={s}')
            "

      - name: Close deploy window (remove notifier sentinel)
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # QNT-109: always remove the sentinel, even on failed deploys.
            # If this step is skipped entirely, the notifier's stale-sentinel
            # check (>10 min = fail-open) ensures alerts resume automatically.
            rm -f /opt/equity-data-agent/.deploy-in-progress
