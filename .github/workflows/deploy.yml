name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decrypt .env.sops and install on Hetzner
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          # QNT-102: decrypt .env.sops in CI (not on VPS) so the age private key
          # never lands on prod disk. The plaintext .env file does still live on
          # the VPS at rest — docker compose needs it to read env vars — but the
          # authoritative source is the SOPS-encrypted ciphertext in git, and
          # rotation is now a repo workflow instead of hand-editing prod.
          set -euo pipefail

          # Match the local sops version (visible as `sops_version=` in .env.sops
          # metadata) so any format change between releases is a non-issue. Bump
          # in lockstep with `brew upgrade sops` on dev machines.
          SOPS_VERSION=3.12.2
          curl -sSLo /tmp/sops.deb \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops_${SOPS_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/sops.deb
          sops --version

          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

          # --input-type/--output-type: `.env.sops` ends in `.sops` which sops
          # doesn't recognise as dotenv; without explicit flags the decrypter
          # defaults to JSON parsing and fails on the first `#` comment.
          sops -d --input-type dotenv --output-type dotenv .env.sops > .env.decrypted
          chmod 600 .env.decrypted
          # Sanity: decrypted payload must look like a dotenv file. If the key
          # rotated without re-encrypting .env.sops we'd see garbage or empty
          # output — better to fail loud before shipping it to prod.
          if ! grep -q '^[A-Z_][A-Z0-9_]*=' .env.decrypted; then
            echo "::error::Decrypted .env does not look like a dotenv file (no KEY=value lines found)"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Don't swallow keyscan errors — if it fails (DNS, port 22 blocked),
          # surface the cause here rather than as a cryptic "Host key
          # verification failed" from scp two lines down.
          if ! ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed for $HETZNER_HOST — check DNS/firewall before retrying"
            exit 1
          fi

          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            .env.decrypted "$HETZNER_USER@$HETZNER_HOST:/opt/equity-data-agent/.env.decrypted"
          ssh -i ~/.ssh/id_deploy "$HETZNER_USER@$HETZNER_HOST" '
            set -euo pipefail
            cd /opt/equity-data-agent
            mv -f .env.decrypted .env
            chmod 600 .env
            chown root:root .env
          '

          # Runner is ephemeral but scrub anyway — defence in depth.
          shred -u .env.decrypted ~/.config/sops/age/keys.txt ~/.ssh/id_deploy 2>/dev/null || \
            rm -f .env.decrypted ~/.config/sops/age/keys.txt ~/.ssh/id_deploy

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GIT_SHA
          script: |
            set -euo pipefail
            cd /opt/equity-data-agent
            # QNT-109: Mark the deploy window open so docker-events-notify.sh
            # suppresses expected churn (container recreates from GIT_SHA change
            # + image rebuild). The sentinel is removed by the cleanup step
            # below once verify has run. Stale sentinels (>10 min) are ignored
            # by the notifier, so a crashed deploy can't silently mute alerts.
            touch .deploy-in-progress
            # Ensure working tree is clean so git pull can't silently abort on SCP'd hotfixes.
            # If this fails, fix it manually — do NOT mask drift behind a passing deploy.
            # Note: .deploy-in-progress is a deploy-side artifact, so exclude it from the check.
            git diff --quiet -- ':!.deploy-in-progress' && git diff --cached --quiet -- ':!.deploy-in-progress' || { echo "::error::Prod working tree has uncommitted changes; aborting deploy."; git status; exit 1; }
            git pull origin main
            # GIT_SHA is read by the api service in docker-compose.yml and surfaced
            # on /health so external monitoring can distinguish "up" from "up and
            # running the expected commit" (QNT-51 — the runtime counterpart to
            # the CD SHA gate in QNT-88).
            export GIT_SHA
            docker compose --profile prod up -d --build

      - name: Verify prod SHA matches merged commit
        uses: appleboy/ssh-action@v1
        env:
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: EXPECTED_SHA
          script: |
            set -euo pipefail
            REMOTE_SHA=$(cd /opt/equity-data-agent && git rev-parse HEAD)
            if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
              echo "::error::Prod at $REMOTE_SHA, expected $EXPECTED_SHA — deploy did not update the code"
              exit 1
            fi
            echo "Prod at expected SHA: $REMOTE_SHA"

      - name: Verify deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "Waiting for API to come up..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Deploy verified OK"
                exit 0
              fi
              echo "Attempt $i/12 — retrying in 5s..."
              sleep 5
            done
            echo "API health check failed after 60s"
            exit 1

      - name: Verify Dagster loaded expected asset graph
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            docker exec equity-data-agent-dagster-daemon-1 python -c "
            from dagster_pipelines.definitions import defs
            ag = defs.resolve_asset_graph()
            n = len(ag.get_all_asset_keys())
            c = len(list(ag.asset_check_keys))
            s = len(list(defs.schedules))
            assert n >= 8, f'expected >=8 assets, got {n}'
            assert c >= 17, f'expected >=17 asset checks, got {c}'
            assert s >= 2, f'expected >=2 schedules, got {s}'
            print(f'OK: assets={n} checks={c} schedules={s}')
            "

      - name: Close deploy window (remove notifier sentinel)
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # QNT-109: always remove the sentinel, even on failed deploys.
            # If this step is skipped entirely, the notifier's stale-sentinel
            # check (>10 min = fail-open) ensures alerts resume automatically.
            rm -f /opt/equity-data-agent/.deploy-in-progress
