# RAG news-search golden set (QNT-231).
#
# Two layers per fixture (see agent.evals.news_search_eval):
#   * Flag layer  -- the needs_news_search from classify_intent_with_source(question)
#     must equal expected_news_search. QNT-280 made this flag SEMANTIC: it is the
#     classify LLM's judgment OR-ed with the _is_targeted_news keyword floor, so
#     this measures the live model. The topical positive (nvda-datacenter-switching)
#     carries no keyword token and only fires via the semantic path -- it is the
#     load-bearing test of QNT-280.
#   * Retrieval layer (positives only) -- search_news(ticker, question) must
#     return at least one hit whose headline or body contains one of
#     ``expected_terms``. STRUCTURAL relevance, never a frozen headline, so
#     the rolling 7-day news window does not make fixtures go stale. A miss is
#     REPORTED, not gated: it can mean a real recall miss OR simply that no
#     such story is in this week's corpus.
#
# Negatives carry no expected_terms (they must NOT fire the search).
#
# NOTE: fixtures must reference only the current TICKERS set --
# load_news_search_fixtures gates every ticker against shared.tickers.TICKERS
# and will raise on a removed symbol, the same way the questions.yaml per-ticker
# coverage test forces a ticker swap to sweep this file alongside
# questions.yaml / dialogue.yaml.

fixtures:
  # --- positives: targeted-event asks that MUST fire semantic news search ---
  - id: nvda-litigation
    ticker: NVDA
    question: "Is NVDA tangled up in any litigation right now?"
    expected_news_search: true
    expected_terms: [litigation, lawsuit, sue, court, legal, settlement]

  - id: nvda-partnership
    ticker: NVDA
    question: "Is there a new Nvidia partnership or collaboration in the works?"
    expected_news_search: true
    expected_terms: [partnership, collaboration, partner, deal, agreement]

  - id: nvda-settlement
    ticker: NVDA
    question: "Did Nvidia reach a settlement in its case?"
    expected_news_search: true
    expected_terms: [settlement, lawsuit, litigation, court, resolve]

  - id: aapl-ceo-buyback
    ticker: AAPL
    question: "What did Apple's CEO say about the buyback?"
    expected_news_search: true
    expected_terms: [buyback, repurchase, ceo, "tim cook", dividend, capital]

  - id: tsla-recall
    ticker: TSLA
    question: "Has Tesla announced any recall recently?"
    expected_news_search: true
    expected_terms: [recall, nhtsa, vehicles, safety, defect]

  - id: googl-antitrust
    ticker: GOOGL
    question: "Where does the Google antitrust case stand?"
    expected_news_search: true
    expected_terms: [antitrust, doj, monopoly, court, ruling, remedy]

  - id: msft-acquisition
    ticker: MSFT
    question: "Any news on a Microsoft acquisition or deal?"
    expected_news_search: true
    expected_terms: [acquisition, deal, acquire, merger, buy, stake]

  - id: msft-ceo-guidance
    ticker: MSFT
    question: "Did Microsoft's CEO change any guidance lately?"
    expected_news_search: true
    expected_terms: [ceo, guidance, outlook, "satya nadella", forecast]

  - id: amzn-layoffs
    ticker: AMZN
    question: "Has Amazon announced layoffs?"
    expected_news_search: true
    expected_terms: [layoff, layoffs, jobs, cuts, workforce, "job cuts"]

  - id: meta-probe
    ticker: META
    question: "Is Meta facing any regulatory probe?"
    expected_news_search: true
    expected_terms: [probe, investigation, regulator, eu, fine, antitrust]

  - id: amd-ceo-statement
    ticker: AMD
    question: "What did the AMD CEO say recently?"
    expected_news_search: true
    expected_terms: [ceo, "lisa su", su, statement, said, comments]

  - id: intc-foundry
    ticker: INTC
    question: "Any news about Intel's foundry plans?"
    expected_news_search: true
    expected_terms: [foundry, fab, manufacturing, "18a", customer, chips]

  - id: mu-pricing
    ticker: MU
    question: "Any news about Micron's memory pricing or demand?"
    expected_news_search: true
    expected_terms: [pricing, demand, dram, nand, memory, hbm]

  # QNT-280: topical / competitive phrasing the keyword gate MISSED (no
  # _TARGETED_NEWS_TOKENS word). The live miss from the ticket -- the corpus
  # holds "Nvidia Overtakes Rivals in Data Center Switching Market" but
  # _is_targeted_news returned False, so the agent served a generic digest. Only
  # the semantic flag fires this; it is the load-bearing positive for QNT-280.
  - id: nvda-datacenter-switching
    ticker: NVDA
    question: "What's the latest on Nvidia in the data center switching / networking market?"
    expected_news_search: true
    expected_terms: [switching, networking, "data center", ethernet, spectrum, infiniband]

  # --- negatives: generic / off-domain asks that must NOT fire the search ---
  - id: aapl-generic-news
    ticker: AAPL
    question: "What's the news on AAPL?"
    expected_news_search: false

  - id: nvda-sentiment
    ticker: NVDA
    question: "How's sentiment on NVDA?"
    expected_news_search: false

  - id: meta-headlines
    ticker: META
    question: "Any headlines on META?"
    expected_news_search: false

  - id: googl-price
    ticker: GOOGL
    question: "What's GOOGL's current price?"
    expected_news_search: false

  - id: msft-thesis
    ticker: MSFT
    question: "Give me a balanced thesis on MSFT."
    expected_news_search: false

  - id: tsla-offtopic
    ticker: TSLA
    question: "What's the weather like for a Tesla road trip?"
    expected_news_search: false
