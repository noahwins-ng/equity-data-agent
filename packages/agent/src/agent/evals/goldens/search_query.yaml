# Contextual RAG query-rewrite golden set (QNT-289).
#
# Both RAG fire points (agent.graph gather node) used to pass the RAW user
# question as the retrieval query. On a warm thread a targeted follow-up is
# often elliptical ("what about the buyback?") -- the classify LLM correctly
# sets needs_news_search/needs_earnings_search from history, but the bare
# ellipsis carries no ticker or topic noun for Qdrant to match against. This
# set scores the classifier's ``search_query`` field (see
# ``agent.intent.IntentDecision.search_query`` and
# ``agent.evals.search_query_eval``) across three fixture kinds:
#
# * "elliptical"    -- a warm-thread follow-up with seeded ``history`` and no
#   ticker named in the question itself. The rewrite must resolve the ticker
#   + topic from history so the query stands alone.
# * "cold_targeted" -- a targeted ask with no history; the question already
#   names its own ticker/topic, so the rewrite must NOT degrade it (still
#   names both).
# * "generic"       -- a generic ask (no targeted event, or no search-worthy
#   intent at all). needs_search must stay False and no rewrite should fire.
#
# ``ticker_terms`` / ``topic_terms`` are ANY-OF alias lists (mirrors
# ``anchor_terms`` in retrieval.yaml) -- the produced ``search_query`` must
# contain at least one alias from EACH list, case-insensitively, for a
# positive fixture. Negative (generic) fixtures carry neither list and must
# produce an EMPTY search_query.
#
# NOTE: fixtures must reference only the current TICKERS set --
# load_search_query_fixtures gates every ticker against shared.tickers.TICKERS,
# the same way questions.yaml / news_search.yaml / routing.yaml do.

fixtures:
