# Golden-set questions for agent evaluation (QNT-67, eval type (b)).
#
# Records span every ticker in shared.tickers.TICKERS (coverage enforced by
# tests/agent/evals/test_questions_yaml.py) and exercise every supported
# intent shape: thesis, quick_fact, comparison, conversational, plus the
# QNT-176 focused-analysis trio (fundamental, technical, news_sentiment).
# The mix favours thin/quiet tickers (UNH, V, JPM) over the obvious
# heavyweights (NVDA, AAPL) so prompt regressions on the long tail don't
# hide behind tech-mega-cap successes (Phase 2 retro lesson —
# feedback_sample_ac_broadly.md). The record-count band lives in
# test_record_count_within_target_band; bump it together when adding
# records here.
#
# Record shape:
#   - id: short-slug                     # stable identifier; appears in history.csv
#     ticker: NVDA                        # must be in shared.tickers.TICKERS
#     question: "…"                       # what the user would ask the agent
#     expected_tools:                     # subset of REPORT_TOOLS the question
#       - technical                       # MUST trigger; over-fetching is OK by design
#     reference_thesis: |                 # what a "good" thesis looks like — used
#       …                                 # by LLM-as-judge for rubric comparison
#                                         # and by the cosine signal as the target
#                                         # text. Don't pin specific numbers — the
#                                         # judge compares structure and coverage.

questions:
  - id: nvda-technical
    ticker: NVDA
    question: "Is NVDA overbought right now? Walk me through the technical setup."
    expected_tools:
      - technical
    reference_thesis: |
      A useful answer leads with the trend direction (uptrend, downtrend,
      consolidating) drawn from moving-average alignment, names the current
      RSI bucket (overbought / neutral / oversold) and the MACD posture, and
      explicitly cites the technical report. It avoids manufacturing target
      prices the report does not provide and ends with a confidence line tied
      to whether the technical signals agreed or diverged.

  - id: nvda-fundamental
    ticker: NVDA
    question: "What does NVDA's most recent fundamental picture look like?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer summarises the latest reported earnings, revenue, and
      P/E from the fundamental report, calls out any earnings surprise and
      its direction, and abstains from forward-looking projections that the
      report does not contain. Cites (source: fundamental) on every numeric
      claim and ends with a confidence line that depends on report coverage.

  - id: aapl-fundamental
    ticker: AAPL
    question: "How is AAPL valued relative to its earnings?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer reports AAPL's latest P/E ratio and EPS verbatim from
      the fundamental report, places the multiple in context using only
      qualitative language (rich, in-line, compressed) since the report does
      not supply peer comparables, and refuses to compute YoY growth that
      isn't already stated. Cites the fundamental report and ends with a
      data-completeness-anchored confidence line.

  - id: aapl-technical
    ticker: AAPL
    question: "Where is AAPL on the price chart — is the trend intact?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful answer reads the trend label and SMA stack from the technical
      report, names the RSI bucket and MACD posture, and avoids reading
      support / resistance levels that aren't explicitly tabulated. Cites
      (source: technical) and ends with a confidence line keyed to whether
      the technical indicators were internally consistent.

  - id: msft-news
    ticker: MSFT
    question: "What's the recent news sentiment around MSFT?"
    expected_tools:
      - news
    reference_thesis: |
      A useful answer summarises tone (constructive, mixed, cautious) drawn
      strictly from the news report, paraphrases at most two notable
      headlines without inventing details, and tags the news report as the
      sole source. If the news report is unavailable it states so plainly
      and lowers the confidence line accordingly.

  - id: googl-technical
    ticker: GOOGL
    question: "How is GOOGL trending technically over the recent window?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful answer states the trend label, RSI bucket, and MACD posture
      from the technical report, calls out moving-average alignment if the
      report flags it, and avoids inventing target levels. Cites (source:
      technical) per the system prompt and ends with a confidence line.

  - id: googl-combined
    ticker: GOOGL
    question: "Give me a balanced thesis on GOOGL — fundamentals plus technicals."
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A useful answer integrates the technical posture (trend, RSI, MACD)
      and the fundamental snapshot (latest EPS, P/E, earnings surprise)
      without doing arithmetic across them. Cites both source reports
      explicitly on the numeric claims and resolves a final disposition
      (constructive / neutral / cautious). The confidence line is graded
      down if either report was missing.

  - id: amzn-fundamental
    ticker: AMZN
    question: "What's the fundamental case for AMZN at the moment?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer reports AMZN's latest revenue, EPS, and P/E verbatim
      from the fundamental report, notes the direction of the most recent
      earnings surprise without inventing magnitudes, and refuses to project
      growth rates the report does not state. Cites (source: fundamental).

  - id: meta-combined
    ticker: META
    question: "Should I be cautious about META based on the latest data?"
    expected_tools:
      - technical
      - fundamental
      - news
    reference_thesis: |
      A useful answer triangulates technical posture, fundamental health,
      and news sentiment from the three reports, names disagreements between
      them rather than averaging away, and reaches a clear cautious /
      neutral / constructive disposition. Cites every numeric claim against
      its source report; the confidence line tracks how many of the three
      reports were actually supplied.

  - id: meta-news
    ticker: META
    question: "What's driving recent META headlines?"
    expected_tools:
      - news
    reference_thesis: |
      A useful answer summarises the tone of META coverage (constructive,
      mixed, cautious) and surfaces at most two concrete headlines from the
      news report without paraphrasing them into facts the report does not
      state. Cites (source: news) and ends with a confidence line that
      reflects whether the news report was supplied.

  - id: tsla-technical
    ticker: TSLA
    question: "Is TSLA breaking out or breaking down on the charts?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful answer leads with the trend label and momentum readings from
      the technical report (RSI bucket, MACD posture, SMA alignment) and
      avoids inventing breakout / breakdown levels that the report does not
      supply. Cites (source: technical) and ends with a confidence line.

  - id: tsla-news
    ticker: TSLA
    question: "What's the recent news flow around TSLA?"
    expected_tools:
      - news
    reference_thesis: |
      A useful answer summarises news tone, surfaces at most two headlines
      verbatim or near-verbatim from the news report, and cites (source:
      news). It does not invent quotes or attribute events the news report
      did not include.

  - id: jpm-fundamental
    ticker: JPM
    question: "How is JPM valued versus its latest earnings?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer states JPM's latest EPS and P/E ratio verbatim from
      the fundamental report, comments qualitatively on the multiple
      (premium / in-line / discounted) without inventing peer comparables,
      and notes the direction of the most recent earnings surprise. Cites
      (source: fundamental).

  - id: v-combined
    ticker: V
    question: "Give me a balanced thesis on V right now."
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A useful answer combines the technical posture (trend, momentum) and
      the fundamental snapshot (latest EPS, P/E, earnings surprise) into a
      single disposition. Numeric claims are cited against their source
      report; the answer refuses to compute composite scores the reports
      don't provide. Confidence is anchored to how complete the supplied
      reports were.

  - id: unh-fundamental
    ticker: UNH
    question: "What is UNH's current fundamental health?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer reports UNH's latest revenue, EPS, and P/E verbatim
      from the fundamental report, names the direction of the latest
      earnings surprise, and abstains from projecting forward earnings the
      report does not contain. Cites (source: fundamental) and ends with a
      data-completeness-keyed confidence line.

  - id: unh-news
    ticker: UNH
    question: "Are there any concerning news items on UNH lately?"
    expected_tools:
      - news
    reference_thesis: |
      A useful answer reads tone and notable headlines straight from the
      news report, escalates only what the report itself flags as material
      (regulatory, litigation, M&A) without manufacturing a narrative, and
      tags (source: news). If no news report is available it says so and
      lowers the confidence line accordingly.

  # QNT-149: quick-fact golden. Single-metric question that the classifier
  # heuristic routes to the quick_fact response shape (no thesis card, just
  # a short answer + cited value). The reference text mirrors the shape
  # ``QuickFactAnswer.to_markdown()`` produces so the cosine + judge
  # scorers compare like-against-like.
  - id: nvda-quickfact-rsi
    ticker: NVDA
    question: "What's NVDA's RSI right now?"
    expected_tools:
      - technical
    expected_intent: quick_fact
    reference_thesis: |
      A useful answer states NVDA's current RSI value verbatim from the
      technical report and labels the bucket (overbought, neutral,
      oversold) with the canonical thresholds the report cites. Cites
      (source: technical) inline. No thesis sections, no padding with
      fundamental or news context — the question is a single-metric
      lookup.

      **Value:** <RSI value> (source: technical)

  # QNT-156: comparison golden. Two-ticker question that the classifier
  # heuristic routes to the comparison response shape. The graph fetches
  # reports for each ticker independently; the synthesize step renders a
  # ComparisonAnswer with per-ticker sections + a qualitative differences
  # paragraph. ADR-003 still applies: no cross-ticker arithmetic — the LLM
  # does not compute a synthetic delta the reports do not state. The record
  # ticker is one of the two named tickers (the loader gates on
  # shared.tickers.TICKERS); the second ticker is parsed from the question.
  - id: nvda-vs-aapl-fundamental
    ticker: NVDA
    question: "Compare NVDA vs AAPL on valuation and fundamentals."
    expected_tools:
      - fundamental
    expected_intent: comparison
    reference_thesis: |
      A useful answer renders one section per ticker with verbatim cited
      values from each ticker's fundamental report (latest P/E, EPS,
      revenue trend) and a SHORT qualitative differences paragraph that
      contrasts the two ("trades at a richer multiple", "shows stronger
      margin trend") WITHOUT computing a synthetic ratio or delta the
      reports do not state. Each per-ticker section cites only that
      ticker's reports. No "NVDA's P/E is 2x AAPL's" — that is
      arithmetic and violates ADR-003.

  # QNT-156: conversational golden. Off-domain question that the
  # classifier heuristic routes to the conversational shape. The graph
  # skips the gather node entirely (no reports needed) and the synthesize
  # node returns a ConversationalAnswer that names what the agent CAN do
  # plus three suggested questions. The hallucination scorer treats ANY
  # digit in the conversational answer as a regression — there are no
  # reports to cite, so any number IS hallucinated. ``ticker`` is set to
  # an arbitrary symbol just so the loader's ticker-membership check
  # passes; the agent never gathers a report for it.
  - id: conversational-off-domain-weather
    ticker: NVDA
    question: "What's the weather like today?"
    expected_tools: []
    expected_intent: conversational
    reference_thesis: |
      A useful answer is a polite "I don't know that" + a one-line
      redirect to what the agent CAN do (cover ten US public equities
      across technical, fundamental, and news reports; produce a
      thesis, a quick fact, or a side-by-side comparison). It includes
      three suggested questions drawn from the agent's actual
      capabilities. CONTAINS NO DIGITS — no years, no counts, no
      percentages.

  # QNT-176: focused-analysis goldens. Three records — one per focused
  # intent (fundamental / technical / news_sentiment). The plan node
  # narrows DETERMINISTICALLY to ``[company, <focus_report>]``, so
  # ``expected_tools`` is exactly that pair (no over-fetch tolerance
  # required, but the tool-call check would accept it either way).
  # Tickers are picked from the long-tail (UNH, V) plus one heavyweight
  # so a prompt regression on the niche names is visible.
  - id: jpm-fundamental-deepdive
    ticker: JPM
    question: "Walk me through JPM's fundamentals — valuation deep dive."
    expected_tools:
      - company
      - fundamental
    expected_intent: fundamental
    reference_thesis: |
      A useful answer is a focused fundamental read: 2-4 sentences of
      summary leaning on JPM's valuation (P/E vs. its threshold), latest
      EPS, revenue, and net-margin posture pulled VERBATIM from the
      fundamental report and grounded in JPM's actual business segments
      from the company report. 2-5 key-point bullets cite underlying
      metrics with (source: fundamental) or (source: company). Cited
      values list contains 1-4 entries (P/E, EPS, revenue, margin) each
      copied byte-for-byte from the report. NO technical / chart talk
      (RSI, MACD, SMA-50) — the focus is fundamentals only. NO four-
      section thesis, NO buy/sell verdict.

  - id: v-technical-analysis
    ticker: V
    question: "Give me a technical analysis of V — chart setup and indicators."
    expected_tools:
      - company
      - technical
    expected_intent: technical
    reference_thesis: |
      A useful answer is a focused technical read: 2-4 sentences naming
      the trend direction (uptrend / downtrend / consolidation) drawn
      from moving-average alignment, the current RSI bucket (overbought
      / neutral / oversold) with the canonical thresholds, and the MACD
      posture relative to its signal line — all VERBATIM from the
      technical report. 2-5 key-point bullets cite underlying values
      with (source: technical) or (source: company). Cited values list
      surfaces RSI, MACD, SMA-50 or current price (1-4 entries) copied
      byte-for-byte. NO P/E / earnings talk — focus is technicals
      only. NO four-section thesis, NO buy/sell verdict.

  - id: unh-news-sentiment
    ticker: UNH
    question: "What's the news sentiment on UNH — any concerning headlines?"
    expected_tools:
      - company
      - news
    expected_intent: news_sentiment
    reference_thesis: |
      A useful answer is a focused news-sentiment read: 2-4 sentences
      capturing the OVERALL TILT of recent UNH headlines in qualitative
      language ("constructive", "mixed", "cautious") with (source: news)
      cites and (source: company) for any qualitative business context.
      2-5 key-point bullets each quote or summarise one headline with
      (source: news). Cited values list MAY be empty (news sentiment
      often has no quantitative anchor) or hold one qualitative label
      like "constructive" with source=news. NO P/E, RSI, or other
      numeric metrics from technical / fundamental — those reports were
      not gathered for this focus. NO four-section thesis, NO buy/sell
      verdict.

  # QNT-183: regime-polarity golden. Single-ticker thesis question where the
  # technical report prints an overbought RSI. A correct answer places the
  # overbought reading in the BEAR case (or omits the technical section
  # from bull entirely) — it must NOT cite the overbought RSI as a bull
  # bullet even if the SIGNAL aggregate prints BULLISH. This record pins
  # the regime-polarity rule added in QNT-183.
  - id: tsla-overbought-rsi-regime
    ticker: TSLA
    question: "Give me a thesis on TSLA — is the technical setup bullish?"
    expected_tools:
      - technical
    forbidden_bull_substrings:
      - "overbought"
    reference_thesis: |
      A correct thesis for a ticker whose RSI sits in the overbought
      bucket does NOT list the overbought RSI reading as a bull-case
      bullet. Overbought RSI is regime-labeled bear evidence (mean-
      reversion risk) — it belongs in the bear case or is noted as a
      caution in the verdict, never padded into the bull section. The
      bull case draws only on metrics that genuinely support upside:
      trend direction, SMA alignment, MACD posture relative to signal.
      Each bullet cites (source: technical) and avoids re-quoting the
      SIGNAL aggregate line. Bear case explicitly names the overbought
      condition as a risk factor with its label cited verbatim from the
      report.

  # QNT-184: anti-SIGNAL-footer regression. Focused-technical question
  # supplied a technical report that ends with "## SIGNAL\nBULLISH (X/Y
  # indicators agree)". The FOCUSED_SYSTEM_PROMPT anti-SIGNAL rule forbids
  # quoting that footer; forbidden_substrings pins it as a hard gate.
  # "indicators agree" is used rather than bare "signal" to avoid false
  # positives from legitimate MACD phrases like "MACD above signal line".
  - id: tsla-focused-technical-no-signal-quote
    ticker: TSLA
    question: "Give me a technical analysis on TSLA."
    expected_tools:
      - company
      - technical
    expected_intent: technical
    forbidden_substrings:
      - "indicators agree"
    reference_thesis: |
      A useful answer is a focused technical read with 2-4 sentences naming
      the trend direction, RSI bucket, and MACD posture pulled VERBATIM from
      the technical report. Key-point bullets cite specific metric values
      (e.g. "RSI 58.0 neutral", "close above SMA-50 by +9.17%", "MACD
      +15.32 above signal line") — NOT the SIGNAL aggregate footer
      ("3/3 indicators agree" or "the overall signal is bullish"). The
      output must not contain the phrase "indicators agree" or paraphrase
      the SIGNAL footer as a bullet or summary sentence.

  # QNT-183: regime-contrast comparison golden. Two-ticker comparison where
  # one ticker has an overbought RSI and the other is neutral/oversold.
  # A correct differences paragraph does NOT pair "stronger momentum" with
  # the higher-but-overbought RSI — it phrases the contrast as "more
  # stretched" or "approaching overbought" per the regime-mirror rule.
  - id: nvda-msft-rsi-regime-contrast
    ticker: NVDA
    question: "Compare NVDA vs MSFT on technical momentum."
    expected_tools:
      - technical
    expected_intent: comparison
    forbidden_substrings:
      - "stronger momentum"
    reference_thesis: |
      A correct comparison differences paragraph contrasts two tickers
      with RSIs in different regime buckets WITHOUT framing the higher
      RSI as "stronger momentum" when that RSI sits in the overbought
      zone. Correct phrasing: "more stretched technically", "approaching
      overbought", "NVDA's RSI is in overbought territory while MSFT's
      sits in neutral" — NOT "NVDA shows stronger momentum because its
      RSI is higher". Each per-ticker section cites its own technical
      report verbatim. The differences paragraph introduces no new
      numbers and uses regime language to characterise the contrast.

  # QNT-185: prior-session momentum-delta golden. Thesis question where the
  # technical report prints a current RSI with a prior-session delta showing
  # a drop from overbought into the neutral band. A correct bull bullet (if
  # any) characterises the directional move ("cooling from overbought",
  # "rolling over") rather than reading only the current bucket label.
  # forbidden_substrings pins the exact anti-pattern observed in the
  # 2026-05-18 analyst-quality assessment sample 1 (NVDA thesis).
  - id: nvda-rsi-momentum-delta
    ticker: NVDA
    question: "Give me a balanced thesis on NVDA — is the technical momentum supporting further upside?"
    expected_tools:
      - technical
    forbidden_substrings:
      - "potential for further growth"
    reference_thesis: |
      A correct thesis for a ticker where RSI has dropped from the
      overbought zone into the neutral band names the directional move,
      not just the current bucket. Bull bullets do NOT say "RSI is
      neutral, indicating potential for further growth" — they say
      "RSI cooling from overbought" or "RSI rolling over from the 70+
      zone", citing both the current and prior-session values verbatim
      from the technical report. The prior-session delta is data, not
      flavour: a large downward move signals mean-reversion risk and
      belongs in context (bear case or verdict), not as upside evidence.
      Each bullet cites (source: technical) and avoids re-quoting the
      SIGNAL aggregate footer.

  # QNT-194: verdict-shape golden. Thesis question where the technical report
  # supplies concrete SMA and RSI levels. A correct action is trigger-shaped:
  # it names a condition (price level or indicator threshold) AND a position
  # action verb (trim, hold, reduce, defend, etc.). State-shaped actions
  # ("Close above SMA-50") fail the verdict_shape_ok deterministic check.
  - id: amzn-verdict-shape
    ticker: AMZN
    question: "Give me a thesis on AMZN — what's the right trade action here?"
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A correct thesis for AMZN ends with a trigger-shaped verdict action.
      The action names a specific condition drawn from the reports (a price
      level relative to an SMA, an RSI threshold, a support/resistance zone)
      AND a position verb: trim, hold, reduce, defend, accumulate, or exit.
      "Close above SMA-50 at X.XX" is NOT an action — it is a description
      of the present state. A correct action looks like: "Hold; reduce on
      close below SMA-50 at X.XX as trend invalidation." or "Trim above
      Y; defend SMA-50 at X as the bear-case trigger." The Bull and Bear
      cases cite verbatim values from the technical and fundamental reports
      with inline (source: technical) and (source: fundamental) tags.

  # QNT-198: neutral-RSI-trending-down polarity regression. The technical
  # report prints RSI at a neutral level but declining from a higher prior-
  # session value. A correct thesis places the declining RSI in the BEAR
  # case only — not as a bull bullet, and not in both cases.
  - id: nvda-rsi-neutral-trending-down
    ticker: NVDA
    question: "Give me a thesis on NVDA — what does the RSI trend say about near-term momentum?"
    expected_tools:
      - technical
    forbidden_bull_substrings:
      - "trending down"
    reference_thesis: |
      A correct thesis where RSI is in the neutral zone but declining
      places that directional signal in the BEAR case only. "RSI neutral
      but trending down" is a bearish momentum signal — it appears
      exclusively as a bear bullet (e.g., "RSI rolling over from the
      neutral zone, momentum fading (source: technical)"). The bull case
      draws on other supporting metrics (SMA alignment, MACD posture)
      if available, or stays empty if no genuine bull evidence exists.
      The RSI indicator does not appear in both bull and bear bullets.
