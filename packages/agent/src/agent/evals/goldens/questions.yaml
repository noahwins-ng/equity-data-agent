  # QNT-358: news-axis comparison golden. A focused axis comparison narrows the
  # plan to company + news for BOTH tickers, so the card renders only the
  # Company + News aspects per ticker (fundamental / technical omitted).
  - id: nvda-amd-news-comparison
    ticker: NVDA
    question: "Compare NVDA vs AMD on recent news and catalysts -- who has the stronger story?"
    expected_tools:
      - news
    expected_intent: comparison
    reference_thesis: |
      A useful answer renders one section per ticker carrying ONLY the Company
