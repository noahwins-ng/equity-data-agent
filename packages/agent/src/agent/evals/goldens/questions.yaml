# Golden-set questions for agent evaluation (QNT-67, eval type (b)).
#
# QNT-208 rewrote every reference_thesis for the new v2 four-aspect shape:
# Company / Fundamental / Technical / News blocks (each with summary +
# supports + challenges + optional aspect label) plus an Overweight /
# Neutral / Underweight verdict whose rationale names at least one aspect
# label verbatim. Forbidden-substring gates are scoped per-aspect under
# ``forbidden_aspect_support_substrings`` (was ``forbidden_bull_substrings``).
# The ``news_sentiment`` intent was renamed to ``news`` per the v2
# vocabulary cleanup.
#
# Records span every ticker in shared.tickers.TICKERS (coverage enforced by
# tests/agent/evals/test_questions_yaml.py) and exercise every supported
# intent shape: thesis, quick_fact, comparison, conversational, plus the
# QNT-176 focused-analysis trio (fundamental, technical, news).
#
# Record shape:
#   - id: short-slug                                  # stable identifier; appears in history.csv
#     ticker: NVDA                                     # must be in shared.tickers.TICKERS
#     question: "..."                                  # what the user would ask the agent
#     expected_tools:                                  # subset of REPORT_TOOLS the question
#       - technical                                    # MUST trigger; over-fetching is OK by design
#     expected_intent: thesis                          # optional intent pin
#     forbidden_substrings: []                         # optional global anti-patterns
#     forbidden_aspect_support_substrings:             # optional per-aspect anti-patterns
#       technical: ["overbought"]                      # checked against technical.supports list
#     reference_thesis: |                              # what a "good" thesis looks like

questions:
  - id: nvda-technical
    ticker: NVDA
    question: "Is NVDA overbought right now? Walk me through the technical setup."
    expected_tools:
      - technical
    reference_thesis: |
      A useful answer is a four-aspect thesis. The Technical aspect carries
      the daily TREND label verbatim (Uptrend / Sideways / Downtrend) and
      its supports / challenges cite the underlying RSI bucket, MACD posture,
      and SMA alignment that produced the label (source: technical). The
      Fundamental aspect carries a Premium / Inline / Discounted label drawn
      from the report's valuation multiples. Company and News aspects are
      narrative-only. Verdict is Overweight / Neutral / Underweight with a
      rationale that mentions at least one of the aspect labels verbatim.

  - id: nvda-fundamental
    ticker: NVDA
    question: "What does NVDA's most recent fundamental picture look like?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful answer is a four-aspect thesis. The Fundamental aspect carries
      a Premium / Inline / Discounted label quoted verbatim from the
      fundamental report and its supports / challenges cite the underlying
      P/E, EPS, revenue, and earnings-surprise direction (source: fundamental).
      The Technical aspect carries a TREND label. Company and News aspects
      are narrative-only. Verdict is Overweight / Neutral / Underweight with
      a rationale that names the Fundamental label verbatim.

  - id: aapl-fundamental
    ticker: AAPL
    question: "How is AAPL valued relative to its earnings?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries one of
      Premium / Inline / Discounted (quoted verbatim from the report) with
      supports / challenges that cite AAPL's latest P/E and EPS plus the
      report's own-history bucket (source: fundamental). No peer comparables
      are invented when the report shows N/A. Company / Technical / News
      aspects are populated to the extent their reports support them.
      Verdict mentions the Fundamental label verbatim.

  - id: aapl-technical
    ticker: AAPL
    question: "Where is AAPL on the price chart -- is the trend intact?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful four-aspect thesis. The Technical aspect carries the daily
      TREND label verbatim (Uptrend / Sideways / Downtrend) and its
      supports / challenges cite SMA stack alignment, RSI bucket, MACD
      posture from the technical report (source: technical). No invented
      support / resistance levels. Verdict references the Technical label
      verbatim.

  - id: msft-news
    ticker: MSFT
    question: "What's the recent news flow around MSFT?"
    expected_tools:
      - news
    reference_thesis: |
      A useful four-aspect thesis. The News aspect summarises the running
      story drawn strictly from the news report and surfaces at most two
      notable headlines without inventing details, citing (source: news).
      Other aspects are populated to the extent their reports allow.
      Verdict cites at least one aspect label verbatim.

  - id: googl-technical
    ticker: GOOGL
    question: "How is GOOGL trending technically over the recent window?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful four-aspect thesis. The Technical aspect carries the daily
      TREND label verbatim and its supports / challenges cite RSI, MACD,
      and moving-average alignment from the technical report (source:
      technical). No invented target levels. Verdict mentions the Technical
      label verbatim.

  - id: googl-combined
    ticker: GOOGL
    question: "Give me a balanced thesis on GOOGL -- fundamentals plus technicals."
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label; the Technical aspect carries an
      Uptrend / Sideways / Downtrend label. Both label sources are quoted
      verbatim from their reports. Aspect supports / challenges cite the
      underlying metrics (P/E, EPS, RSI, MACD) without doing arithmetic
      across reports. Verdict mentions at least one aspect label verbatim.

  - id: amzn-fundamental
    ticker: AMZN
    question: "What's the fundamental case for AMZN at the moment?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label quoted verbatim from the report
      and its supports / challenges cite AMZN's latest revenue, EPS, P/E,
      and earnings-surprise direction (source: fundamental). No invented
      projections. Verdict references the Fundamental label verbatim.

  - id: meta-combined
    ticker: META
    question: "Should I be cautious about META based on the latest data?"
    expected_tools:
      - technical
      - fundamental
      - news
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label; the Technical aspect carries
      an Uptrend / Sideways / Downtrend label. News aspect surfaces material
      headlines. The thesis triangulates the three aspects without averaging
      them away and names disagreements explicitly. Verdict is Overweight /
      Neutral / Underweight and its rationale mentions at least one aspect
      label verbatim. Confidence reflects how many of the three data-driven
      reports were supplied.

  - id: meta-news
    ticker: META
    question: "What's driving recent META headlines?"
    expected_tools:
      - news
    reference_thesis: |
      A useful four-aspect thesis with the News aspect carrying the bulk
      of the analysis. News supports / challenges quote at most two
      headlines verbatim or near-verbatim from the report, citing (source:
      news). Other aspects are populated to the extent their reports
      support. Verdict mentions an aspect label verbatim.

  - id: tsla-technical
    ticker: TSLA
    question: "Is TSLA breaking out or breaking down on the charts?"
    expected_tools:
      - technical
    reference_thesis: |
      A useful four-aspect thesis. The Technical aspect carries the daily
      TREND label verbatim (Uptrend / Sideways / Downtrend) and its
      supports / challenges cite RSI bucket, MACD posture, and SMA alignment
      from the report (source: technical). No invented breakout / breakdown
      levels. Verdict references the Technical label verbatim.

  - id: tsla-news
    ticker: TSLA
    question: "What's the recent news flow around TSLA?"
    expected_tools:
      - news
    reference_thesis: |
      A useful four-aspect thesis. The News aspect surfaces at most two
      headlines verbatim or near-verbatim with (source: news). Other
      aspects are populated to the extent their reports allow. Verdict
      mentions an aspect label verbatim.

  - id: mu-fundamental
    ticker: MU
    question: "How is MU valued versus its latest earnings?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label quoted verbatim from the report
      and its supports / challenges cite MU's latest EPS, P/E, and
      earnings-surprise direction (source: fundamental). Multiple framing
      uses the report's own bucket, not invented peer comparables. Verdict
      mentions the Fundamental label verbatim.

  - id: amd-combined
    ticker: AMD
    question: "Give me a balanced thesis on AMD right now."
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label; the Technical aspect carries an
      Uptrend / Sideways / Downtrend label. Aspect supports / challenges
      cite the underlying metrics from each report without doing arithmetic
      across them. Verdict mentions at least one aspect label verbatim.
      Confidence reflects how complete the supplied reports were.

  - id: amd-fundamental
    ticker: AMD
    question: "What is AMD's current fundamental health?"
    expected_tools:
      - fundamental
    reference_thesis: |
      A useful four-aspect thesis. The Fundamental aspect carries a
      Premium / Inline / Discounted label and its supports / challenges
      cite AMD's latest revenue, EPS, P/E, and earnings-surprise direction
      (source: fundamental). No invented forward earnings. Verdict
      mentions the Fundamental label verbatim.

  - id: intc-news
    ticker: INTC
    question: "What's the latest news on INTC -- any notable headlines?"
    expected_tools:
      - news
    reference_thesis: |
      A useful four-aspect thesis with the News aspect carrying the bulk
      of analysis. News supports / challenges read material headlines
      straight from the report (upgrades, analyst calls, valuation, foundry
      or product developments -- positive or negative as the report shows)
      without manufacturing a narrative, citing (source: news). Verdict
      mentions an aspect label verbatim.

  # QNT-149: quick-fact golden. Single-metric question that the classifier
  # heuristic routes to the quick_fact response shape.
  - id: nvda-quickfact-rsi
    ticker: NVDA
    question: "What's NVDA's RSI right now?"
    expected_tools:
      - technical
    expected_intent: quick_fact
    reference_thesis: |
      A useful answer states NVDA's current RSI value verbatim from the
      technical report and labels the bucket (overbought, neutral,
      oversold) with the canonical thresholds the report cites. Cites
      (source: technical) inline. No thesis sections, no padding with
      fundamental or news context.

      **Value:** <RSI value> (source: technical)

  # QNT-354: absolute-scale quick facts. Before the SCALE block landed the
  # fundamental report carried no absolute revenue / market cap, so these asks
  # returned "not available in the supplied reports"; now they answer with the
  # cited figure from the ## SCALE block.
  - id: nvda-quickfact-revenue
    ticker: NVDA
    question: "What's NVDA's revenue?"
    expected_tools:
      - fundamental
    expected_intent: quick_fact
    reference_thesis: |
      A useful answer states NVDA's absolute revenue verbatim from the
      ## SCALE block (Revenue (TTM)) and cites (source: fundamental) inline.
      It must NOT say the figure is unavailable. No thesis sections, no
      padding with technical or news context.

      **Value:** <revenue> (source: fundamental)

  - id: nvda-quickfact-market-cap
    ticker: NVDA
    question: "What's NVDA's market cap?"
    expected_tools:
      - fundamental
    expected_intent: quick_fact
    reference_thesis: |
      A useful answer states NVDA's market cap verbatim from the ## SCALE
      block (Market cap) and cites (source: fundamental) inline. It must NOT
      say the figure is unavailable. No thesis sections, no padding.

      **Value:** <market cap> (source: fundamental)

  # QNT-156: comparison golden — now four-aspect per ticker (QNT-208).
  - id: nvda-vs-aapl-fundamental
    ticker: NVDA
    question: "Compare NVDA vs AAPL on valuation and fundamentals."
    expected_tools:
      - fundamental
    expected_intent: comparison
    reference_thesis: |
      A useful comparison renders one section per ticker, each with the
      four QNT-208 aspect blocks (company / fundamental / technical / news).
      The Fundamental aspect for each ticker carries a Premium / Inline /
      Discounted label quoted verbatim and supports / challenges that cite
      that ticker's P/E, EPS, and revenue (source: fundamental). The
      differences paragraph contrasts the two in qualitative language only,
      with no cross-ticker arithmetic ("trades at a richer multiple", not
      "P/E is 2x"). Each per-ticker section cites only that ticker's reports.

  # QNT-156: conversational golden.
  - id: conversational-off-domain-weather
    ticker: NVDA
    question: "What's the weather like today?"
    expected_tools: []
    expected_intent: conversational
    reference_thesis: |
      A useful answer is a polite "I don't know that" + a one-line
      redirect to what the agent CAN do (cover ten US public equities
      across technical, fundamental, news, and company reports; produce a
      thesis, a quick fact, a side-by-side comparison, or a focused
      analysis). It includes three suggested questions drawn from the
      agent's actual capabilities. CONTAINS NO DIGITS.

  # QNT-176: focused-analysis goldens, reshaped for the QNT-208 per-focus
  # verdict + news catalyst fields.
  - id: mu-fundamental-deepdive
    ticker: MU
    question: "Walk me through MU's fundamentals -- valuation deep dive."
    expected_tools:
      - company
      - fundamental
    expected_intent: fundamental
    reference_thesis: |
      A useful answer is a focused fundamental read: 2-4 sentences of
      summary leaning on MU's valuation, latest EPS, revenue, and
      net-margin posture pulled VERBATIM from the fundamental report and
      grounded in MU's actual business segments from the company report.
      Verdict is one of Premium / Inline / Discounted quoted from the
      report. 2-5 key-point bullets cite underlying metrics with (source:
      fundamental) or (source: company). Cited values list contains 1-4
      entries copied byte-for-byte. NO technical chart talk (RSI, MACD,
      SMA-50). NO four-section thesis.

  - id: intc-technical-analysis
    ticker: INTC
    question: "Give me a technical analysis of INTC -- chart setup and indicators."
    expected_tools:
      - company
      - technical
    expected_intent: technical
    reference_thesis: |
      A useful answer is a focused technical read: 2-4 sentences naming
      the trend direction drawn from moving-average alignment, the current
      RSI bucket, and the MACD posture relative to its signal line -- all
      VERBATIM from the technical report. Verdict is one of Uptrend /
      Sideways / Downtrend quoted from the report's Multi-timeframe consensus
      line across daily / weekly / monthly. 2-5 key-point
      bullets cite underlying values with (source: technical) or (source:
      company). Cited values list surfaces RSI, MACD, SMA-50, or close
      price (1-4 entries). NO P/E / earnings talk.

  - id: intc-news-sentiment
    ticker: INTC
    question: "What's the news on INTC -- recent headlines and catalysts?"
    expected_tools:
      - company
      - news
    expected_intent: news
    reference_thesis: |
      A useful answer is a focused news read: 2-4 sentences summarising
      the running story for INTC (source: news) with (source: company) for
      any qualitative business context. ``existing_development`` carries the
      running story narrative. ``positive_catalysts`` and ``negative_catalysts``
      list cited headlines (each "(source: news)"). 2-5 key-point bullets
      expand the development. NO P/E, RSI, or other numeric metrics from
      technical / fundamental.

  # QNT-208: regime-polarity golden (was QNT-183). Single-ticker thesis
  # where the technical report prints an overbought RSI. A correct answer
  # places the overbought reading in technical.challenges -- it must NOT
  # appear in technical.supports.
  - id: tsla-overbought-rsi-regime
    ticker: TSLA
    question: "Give me a thesis on TSLA -- is the technical setup bullish?"
    expected_tools:
      - technical
    forbidden_aspect_support_substrings:
      technical:
        - "overbought"
    reference_thesis: |
      A correct four-aspect thesis for a ticker whose RSI sits in the
      overbought bucket does NOT list the overbought RSI in
      technical.supports. Overbought RSI is regime-labeled challenge
      evidence and belongs in technical.challenges or is noted as caution
      in the verdict. technical.supports draws only on metrics that
      genuinely support the Technical aspect's label (Uptrend / Sideways /
      Downtrend) -- trend direction, SMA alignment, MACD posture. Each
      bullet cites (source: technical). technical.challenges names the
      overbought condition as a risk factor with its label cited verbatim.

  # QNT-184: anti-SIGNAL-footer regression. Focused-technical question --
  # the focused prompt forbids quoting the SIGNAL footer. "indicators
  # agree" pins the exact anti-pattern.
  - id: tsla-focused-technical-no-signal-quote
    ticker: TSLA
    question: "Give me a technical analysis on TSLA."
    expected_tools:
      - company
      - technical
    expected_intent: technical
    forbidden_substrings:
      - "indicators agree"
    reference_thesis: |
      A useful answer is a focused technical read with 2-4 sentences naming
      the trend direction, RSI bucket, and MACD posture pulled VERBATIM from
      the technical report. Verdict is one of Uptrend / Sideways / Downtrend.
      Key-point bullets cite specific metric values (e.g. "RSI 58.0 neutral",
      "close above SMA-50 by +9.17%", "MACD +15.32 above signal line") --
      NOT the report's TREND label or any SIGNAL aggregate line.

  # QNT-183: regime-contrast comparison golden. Two-ticker comparison
  # where one ticker has an overbought RSI.
  - id: nvda-msft-rsi-regime-contrast
    ticker: NVDA
    question: "Compare NVDA vs MSFT on technical momentum."
    expected_tools:
      - technical
    expected_intent: comparison
    forbidden_substrings:
      - "stronger momentum"
    reference_thesis: |
      A correct comparison differences paragraph contrasts two tickers
      with RSIs in different regime buckets WITHOUT framing the higher
      RSI as "stronger momentum" when that RSI sits in the overbought
      zone. Correct phrasing: "more stretched technically", "approaching
      overbought", "NVDA's RSI is in overbought territory while MSFT's
      sits in neutral". Each per-ticker section carries four aspect blocks
      with verbatim citations from that ticker's reports. The differences
      paragraph introduces no new numbers and uses regime language to
      characterise the contrast.

  # QNT-185: prior-session momentum-delta golden.
  - id: nvda-rsi-momentum-delta
    ticker: NVDA
    question: "Give me a balanced thesis on NVDA -- is the technical momentum supporting further upside?"
    expected_tools:
      - technical
    forbidden_substrings:
      - "potential for further growth"
    reference_thesis: |
      A correct four-aspect thesis for a ticker where RSI has dropped from
      the overbought zone into the neutral band names the directional move,
      not just the current bucket. technical.supports does NOT say "RSI is
      neutral, indicating potential for further growth" -- it says "RSI
      cooling from overbought" or "RSI rolling over from the 70+ zone",
      citing both the current and prior-session values verbatim from the
      technical report. The prior-session delta is data, not flavour: a
      large downward move signals mean-reversion risk and belongs in
      technical.challenges (or the verdict), not supports. Each bullet
      cites (source: technical). Verdict mentions an aspect label verbatim.

  # QNT-194 lineage (verdict-shape): the v2 verdict is closed-set
  # (Overweight / Neutral / Underweight) so the old trigger-shape rule
  # is replaced by a verdict_rationale label-mention check enforced by
  # the verdict_consistency gate in golden_set.py.
  - id: amzn-verdict-shape
    ticker: AMZN
    question: "Give me a thesis on AMZN -- what's the right trade action here?"
    expected_tools:
      - technical
      - fundamental
    reference_thesis: |
      A correct four-aspect thesis for AMZN. The Fundamental aspect carries
      a Premium / Inline / Discounted label; the Technical aspect carries
      an Uptrend / Sideways / Downtrend label. Supports / challenges in
      each aspect cite verbatim values from the technical and fundamental
      reports with inline (source: technical) and (source: fundamental)
      tags. Verdict is one of Overweight / Neutral / Underweight and the
      verdict_rationale mentions at least one aspect label verbatim
      (Premium / Inline / Discounted / Uptrend / Sideways / Downtrend).

  # QNT-198: neutral-RSI-trending-down polarity regression. A correct
  # thesis places the declining RSI in technical.challenges only.
  - id: nvda-rsi-neutral-trending-down
    ticker: NVDA
    question: "Give me a thesis on NVDA -- what does the RSI trend say about near-term momentum?"
    expected_tools:
      - technical
    forbidden_aspect_support_substrings:
      technical:
        - "trending down"
    reference_thesis: |
      A correct four-aspect thesis where RSI is in the neutral zone but
      declining places that directional signal in technical.challenges only.
      "RSI neutral but trending down" is a bearish momentum signal -- it
      appears exclusively as a technical.challenges bullet (e.g., "RSI
      rolling over from the neutral zone, momentum fading (source:
      technical)"). technical.supports draws on other supporting metrics
      (SMA alignment, MACD posture) if available, or stays empty if no
      genuine supports exist. The RSI indicator does not appear in both
      supports and challenges within the Technical aspect.

