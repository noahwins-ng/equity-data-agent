    ticker: TSLA
    question: "Compare TSLA vs AMD on technical momentum -- who has the stronger chart setup?"
    expected_tools:
      - technical
    expected_intent: comparison
    reference_thesis: |
      A useful comparison renders one section per ticker, each with the
