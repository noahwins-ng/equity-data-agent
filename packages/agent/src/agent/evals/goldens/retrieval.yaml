# RAG retrieval-eval topics (QNT-261).
#
# Stage-1 retrieval eval: query -> relevant doc ids, scored with classic IR
# metrics (recall@k / MRR / nDCG via ir_measures), SEPARATE from the generation
# judge. See agent.evals.retrieval_eval + docs/v2-overall-enhancement.md
# ("RAG eval framework").
#
# This file is the TOPICS half (queries + the relevance criterion). The LABELS
# (qid -> relevant Qdrant point ids) live in retrieval_qrels.trec, and the frozen
# dense ranking in retrieval_run.trec -- both captured from the live corpus and
# committed so the CI gate scores them offline. Regenerate after a corpus change:
#   uv run python -m agent.evals.retrieval_eval --label      # rewrites qrels
#   uv run python -m agent.evals.retrieval_eval --baseline   # rewrites run + history
#
# Fields:
#   id            stable slug, also the TREC query id.
#   corpus        news | earnings  (-> equity_news | equity_earnings).
#   ticker        must be in shared.tickers.TICKERS.
#   query         the natural-language search text sent to dense retrieval.
#   anchor_terms  the lexical relevance criterion: a doc is labeled relevant if
#                 its payload text contains ANY of these (case-insensitive),
#                 scanned over the FULL ticker-scoped corpus -- independent of the
#                 dense ranking under test. Hand-picked to be discriminative
#                 (each query labels a small relevant set, 1-25 docs) so recall@k
#                 is meaningful.
#
# Coverage: news across all 10 tickers; earnings on NVDA + AAPL (the only tickers
# with 8-K release chunks indexed so far -- QNT-260 backfill). Earnings queries
# extend automatically as more tickers land: add topics, re-run --label/--baseline.

queries:
