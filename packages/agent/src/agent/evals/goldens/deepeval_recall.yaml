# Recall-appropriate golden set for the DeepEval LLM-judged suite (QNT-275).
#
# WHY THIS FILE EXISTS (separate from questions.yaml)
# ---------------------------------------------------
# The structured golden set (questions.yaml) hand-writes each `reference_thesis`
# as a description of the answer SHAPE -- "the Technical aspect carries a TREND
# label", "Verdict is Overweight / Neutral / Underweight", "supports cite the
# P/E". Those are meta-instructions about how a good answer is STRUCTURED, not
# factual claims about the security that a retrieved report chunk supports. The
# DeepEval ContextualRecallMetric splits the reference into statements and checks
# whether each is attributable to the retrieval context (the gathered reports);
# a shape statement like "Verdict is Overweight / Neutral / Underweight" maps to
# no report chunk, so recall reads structurally low (the n=4 baseline measured
# context_recall 0.29 -- run 20260621T042449Z-b07f37-deepeval). That is a
# measurement-design artifact, NOT a retrieval bug (QNT-275 context).
#
# This file fixes the metric by authoring each `recall_reference` as the FACTS
# the gathered reports actually carry, in declarative form -- every statement is
# attributable to a section the report renders (see the report templates under
# packages/api/src/api/templates/). So context_recall measures the real thing:
# did retrieval surface the report content a faithful answer needs?
#
# DRIFT-ROBUST BY DESIGN. The live reports roll daily (RSI, P/E, headlines all
# change), so references DO NOT pin exact daily values -- they name the report
# fields a faithful answer draws on (RSI value + bucket, the TREND label, the
# trailing P/E, the recent headlines). A statement like "the technical report
# carries the RSI-14 reading and its overbought / neutral / oversold bucket" is
# attributable whatever today's number is, and stays independent ground truth
# (authored a priori, not derived from the run's context -- deriving from context
# would make recall trivially ~1 and measure nothing).
#
# SCOPE. Only data-driven intents that GATHER reports (thesis / focused /
# quick_fact / comparison). Off-domain conversational records (weather, coding,
# capability asks) gather no reports, so context_recall is undefined for them --
# they belong to the structured/dialogue evals, not this retrieval-recall one.
#
# Record shape:
#   - id: short-slug                 # stable identifier; appears in history.csv
#     ticker: NVDA                    # must be in shared.tickers.TICKERS
#     question: "..."                 # what the user asks
#     expected_tools: [technical]     # documents intent; deepeval doesn't gate on it
#     recall_reference: |             # the FACTS the gathered reports carry,
#       ...                           # declarative + drift-robust + attributable

recall:
  # ---- technical reads ---------------------------------------------------
  - id: nvda-technical
    ticker: NVDA
    question: "Is NVDA overbought right now? Walk me through the technical setup."
    expected_tools: [technical]
    recall_reference: |
      NVDA's technical report carries the most recent daily closing price and
      its change, the RSI-14 momentum reading with its overbought / neutral /
      oversold classification, and the MACD(12/26/9) reading relative to its
      signal line. It states the daily TREND label (Uptrend, Sideways, or
      Downtrend) derived from the close versus the SMA-50, the SMA-20 versus the
      SMA-50, and the recent close slope, and reports how far the close sits
      above or below the SMA-50 and SMA-20. The same momentum and trend readings
      are repeated on the weekly and monthly timeframes.

