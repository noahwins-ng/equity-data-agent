# RAG multi-corpus routing golden set (QNT-263; semantic since QNT-280).
#
# The composed corpus set must equal the fixture's ``expected_corpora`` -- the
# set of RAG corpora a question should reach. This is the senior
# multi-corpus-routing signal: a query about a named news event or competitive
# topic reaches the news corpus, a query about management framing / guidance
# reaches the 8-K earnings corpus, a query that spans both reaches both, and a
# generic / single-metric / off-domain ask reaches neither (the canned digests
# carry it).
#
# QNT-280 made the trigger SEMANTIC: the corpora are composed from the classify
# LLM's needs_news_search / needs_earnings_search flags (OR-ed with the keyword
# floor), so routing_eval is now LIVE and scores the model. A fixture's
# expected_corpora is the label the live classifier must reproduce; the topical /
# competitive positives (e.g. nvda-datacenter-switching) are the ones the old
# keyword gates could not reach and are the load-bearing tests of the new path.
# The offline test_routing_yaml only pins structure + keyword SOUNDNESS (a
# keyword-floor hit implies the fixture should fire), not full accuracy.
#
# corpora vocabulary: "news" (equity_news) | "earnings" (equity_earnings).
# An empty list means neither corpus fires.
#
# NOTE: fixtures must reference only the current TICKERS set --
# load_routing_fixtures gates every ticker against shared.tickers.TICKERS and
# raises on a removed symbol, forcing a ticker swap to sweep this file.

fixtures:
  # --- news-only: a named event/entity that wants the news corpus -----------
  - id: nvda-litigation
    ticker: NVDA
    question: "Is NVDA tangled up in any litigation right now?"
    expected_corpora: [news]

  - id: amd-acquisition
    ticker: AMD
    question: "Any news on the AMD acquisition of a networking startup?"
    expected_corpora: [news]

  - id: intc-buyback
    ticker: INTC
    question: "Did Intel announce a buyback?"
    expected_corpora: [news]

  - id: mu-partnership
    ticker: MU
    question: "What's the latest on the Micron partnership with SK Hynix?"
    expected_corpora: [news]

  - id: tsla-recall
    ticker: TSLA
    question: "Is TSLA facing any recall?"
    expected_corpora: [news]

  - id: googl-antitrust
    ticker: GOOGL
    question: "Is there an antitrust probe against GOOGL?"
    expected_corpora: [news]

  - id: meta-layoffs
    ticker: META
    question: "Any headlines on META about layoffs?"
    expected_corpora: [news]

  # QNT-280: topical / competitive phrasings the old keyword gate MISSED. These
  # carry no _TARGETED_NEWS_TOKENS word but name a specific market/competitive
  # angle a directly-relevant headline would answer -- the semantic flag must
  # fire news on them. nvda-datacenter-switching is the live miss from the ticket
  # (corpus headline "Nvidia Overtakes Rivals in Data Center Switching Market").
  - id: nvda-datacenter-switching
    ticker: NVDA
    question: "What's the latest on Nvidia in the data center switching / networking market?"
    expected_corpora: [news]

  - id: amd-server-cpu-share
    ticker: AMD
    question: "How is AMD doing against Intel in the server CPU market lately?"
    expected_corpora: [news]

  # --- earnings-only: management narrative / guidance wants the 8-K corpus ---
  - id: nvda-mgmt-guidance
    ticker: NVDA
    question: "What did management say about guidance?"
    expected_corpora: [earnings]

  - id: nvda-outlook
    ticker: NVDA
    question: "What was NVDA's outlook for next quarter?"
    expected_corpora: [earnings]

  - id: aapl-earnings-release
    ticker: AAPL
    question: "Summarize AAPL's latest earnings release."
    expected_corpora: [earnings]

  - id: msft-guidance
    ticker: MSFT
    question: "What's the guidance for MSFT next year?"
    expected_corpora: [earnings]

  - id: amd-mgmt-commentary
    ticker: AMD
    question: "What was the management commentary on margins for AMD?"
    expected_corpora: [earnings]

  - id: intc-forward-guidance
    ticker: INTC
    question: "What was Intel's forward guidance?"
    expected_corpora: [earnings]

  - id: nvda-earnings-call
    ticker: NVDA
    question: "What did NVDA say on the earnings call?"
    expected_corpora: [earnings]

  - id: tsla-frame-quarter
    ticker: TSLA
    question: "How did management frame the quarter?"
    expected_corpora: [earnings]

  # --- both: a query that spans a named news event AND the earnings narrative
  - id: nvda-ceo-guidance
    ticker: NVDA
    question: "What did the CEO say about guidance?"
    expected_corpora: [news, earnings]

  - id: googl-probe-outlook
    ticker: GOOGL
    question: "Did management address the antitrust probe in its outlook?"
    expected_corpora: [news, earnings]

  - id: intc-buyback-guidance
    ticker: INTC
    question: "Any news on the buyback, and what was the guidance?"
    expected_corpora: [news, earnings]

  # --- neither: generic / single-metric / off-domain -> canned digests ------
  - id: aapl-generic-news
    ticker: AAPL
    question: "What's the news on AAPL?"
    expected_corpora: []

  - id: nvda-rsi
    ticker: NVDA
    question: "What's NVDA's RSI right now?"
    expected_corpora: []

  - id: msft-pe
    ticker: MSFT
    question: "What's the P/E for MSFT?"
    expected_corpora: []

  - id: amd-intc-compare
    ticker: AMD
    question: "Compare AMD and INTC."
    expected_corpora: []

  - id: tsla-price-action
    ticker: TSLA
    question: "How's TSLA's price action looking?"
    expected_corpora: []

  - id: meta-volume
    ticker: META
    question: "What's the volume on META?"
    expected_corpora: []
