[project]
name = "dagster-pipelines"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "dagster>=1.9.0",
    "dagster-webserver>=1.9.0",
    "clickhouse-connect>=0.8.0",
    "pandas>=2.0.0",
    "qdrant-client>=1.13.0",
    "yfinance>=0.2.50",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dagster_pipelines"]

[tool.uv.sources]
shared = { workspace = true }
