[project]
name = "dagster-pipelines"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "dagster>=1.13.13",
    "dagster-docker>=0.25.0",  # QNT-116: DockerRunLauncher for ephemeral run workers
    "dagster-webserver>=1.9.0",
    "clickhouse-connect>=0.8.0",
    "feedparser>=6.0.10",  # legacy Yahoo RSS path (scripts/verify_news_feeds.py); main pipeline migrated to Finnhub per ADR-015
    "httpx>=0.28.1",  # Finnhub /company-news client (QNT-141, per ADR-015)
    "beautifulsoup4>=4.12.0",  # EDGAR 8-K HTML -> text cleaning (QNT-260)
    "pandas>=2.0.0",
    "qdrant-client>=1.15.0",
    "yfinance>=0.2.50",
    "agent",         # agent.evals.judge for weekly online eval (QNT-192)
    "langfuse>=4.0.0",  # Langfuse SDK for trace fetch + score push (QNT-192)
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dagster_pipelines"]

[tool.uv.sources]
shared = { workspace = true }
agent = { workspace = true }
