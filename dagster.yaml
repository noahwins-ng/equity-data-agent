# QNT-112 bind-mount smoke marker (2026-04-20): if this line appears inside
# the running container via `docker exec … cat /dagster_home/dagster.yaml`,
# the repo → container config-delivery path is healthy.
telemetry:
  enabled: false

code_servers:
  local_startup_timeout: 180
  reload_timeout: 180

# QNT-113: cap concurrent runs to protect the daemon cgroup from fan-out OOM.
# Apr 20 incident: a 10-partition `fundamentals_weekly_job` backfill launched
# all 10 subprocess workers at once (DefaultRunCoordinator fires immediately);
# each worker loads the full repo (~150 MB RSS / ~2 GB VM), combined load blew
# past the daemon's 2 GB cgroup and the kernel OOM-killed multiple workers.
# max_concurrent_runs=3 keeps peak usage under ~1.1 GB within the 2 GB limit
# (daemon baseline ~260 MB + sensor-tick headroom ~400 MB + 3 × 150 MB).
# If `mem_limit` on dagster-daemon is raised, this can be raised in proportion.
#
# QNT-114: reserve a non-backfill slot so sensors (ohlcv, fundamentals, news)
# can't be starved by a 3-partition backfill. With max_concurrent_runs=3 and a
# backfill limit of 2, at most 2 backfill runs dequeue at once, leaving >=1
# slot free for sensor-triggered work. `dagster/backfill` is a system tag set
# by the backfill daemon on every backfill-launched run.
run_coordinator:
  module: dagster._core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 3
    tag_concurrency_limits:
      - key: "dagster/backfill"
        limit: 2

# QNT-114: auto-reconcile orphaned STARTED/CANCELING runs after a run-worker
# dies without emitting RUN_FAILURE (kernel OOM-kill of a subprocess is the
# canonical case — Apr 21 AMZN backfill incident). Without run_monitoring,
# these runs stay in STARTED forever, the queue-coordinator keeps counting
# them against max_concurrent_runs, and the backfill daemon keeps relaunching
# the same partition, producing additional ghost slots.
#
# IMPORTANT — recovery mechanism depends on the run launcher:
#
#   * Container-aware launchers (DockerRunLauncher, K8sRunLauncher, …) set
#     `supports_check_run_worker_health = True`. For those, run_monitoring
#     polls worker liveness every `poll_interval_seconds` and fails orphans
#     immediately on the first miss.
#   * DefaultRunLauncher (our current setup — run-workers are subprocesses of
#     the daemon container) returns `supports_check_run_worker_health = False`.
#     The worker-health branch is SKIPPED; only `max_runtime_seconds` fires.
#     So for us, run_monitoring is purely a timeout-based fallback until we
#     migrate to DockerRunLauncher (tracked separately). A real orphan sits
#     STARTED until it crosses `max_runtime_seconds`, then gets failed.
#
# max_runtime_seconds: 1800 (30 min) — our realistic run-time ceiling. Sensor
# jobs take <1 min, scheduled jobs <5 min, a 10-partition backfill fans out to
# ~10 min with max_concurrent_runs=3. Anything past 30 min is almost certainly
# stuck. This matches the Apr 21 AMZN ghost duration (queue wedged ~30 min
# before the daemon was restarted). Per-job tighter timeouts can be set via
# the `dagster/max_runtime_seconds` tag.
#
# max_resume_run_attempts: 0 means Dagster fails orphans instead of resuming
# them — we want loud failures, not silent auto-retry of already-OOM'd work.
# Per-job retry is opt-in via QNT-110's `dagster/max_retries` tag.
run_monitoring:
  enabled: true
  poll_interval_seconds: 120
  start_timeout_seconds: 180
  cancel_timeout_seconds: 180
  max_runtime_seconds: 1800
  max_resume_run_attempts: 0
  free_slots_after_run_end_seconds: 0

# QNT-110: re-launch failed runs on transient system/launch failures
# (e.g. gRPC UNAVAILABLE when the code-server container is mid-restart during
# deploy). Per-job opt-in via the `dagster/max_retries` tag — see
# packages/dagster-pipelines/src/dagster_pipelines/retry.py and docs/patterns.md.
#
# retry_on_asset_or_op_failure: false ensures only LAUNCH-level failures retry.
# User errors inside ops continue to fail loud — a real bug in an asset should
# not silently retry (op-level retry is scoped separately via RetryPolicy).
run_retries:
  enabled: true
  max_retries: 0  # default 0; jobs opt in via `dagster/max_retries` tag
  retry_on_asset_or_op_failure: false
