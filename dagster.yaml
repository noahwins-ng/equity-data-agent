# QNT-112 bind-mount smoke marker (2026-04-20): if this line appears inside
# the running container via `docker exec … cat /dagster_home/dagster.yaml`,
# the repo → container config-delivery path is healthy.
telemetry:
  enabled: false

code_servers:
  local_startup_timeout: 180
  reload_timeout: 180

# QNT-116: run ephemeral containers instead of spawning subprocesses inside the
# daemon cgroup. Image is inferred from DAGSTER_CURRENT_IMAGE on the code-server
# service (equity-data-agent-dagster:latest) — no explicit `image:` needed here.
#
# Why this replaces DefaultRunLauncher:
#   * DefaultRunLauncher spawns a Python subprocess inside the daemon cgroup,
#     importing the full repo per run. With N fan-out, cgroup pressure scales
#     with N — the QNT-111/113/115 mem_limit-bump cycle.
#   * DefaultRunLauncher also returns supports_check_run_worker_health = False,
#     so run_monitoring's STARTED-orphan branch (monitor_started_run) is a
#     no-op. QNT-114's chaos test proved this: STARTED recovery falls back to
#     max_runtime_seconds: 1800 (~30 min) rather than the per-worker health
#     check (~2 min).
#   * DockerRunLauncher gets both: each run is a separate container (own cgroup,
#     OOM kill is local), AND it supports per-worker health checks so the
#     STARTED-orphan path actually fires in ~2 min.
#
# Env-var passthrough is explicit — every key here must exist in
# packages/shared/src/shared/config.py::Settings, OR be on the Dagster-infra
# allowlist (currently just DAGSTER_HOME). QNT-125 added a CI guard that
# enforces this invariant: see
# tests/dagster/test_run_launcher_env_vars.py. Do NOT
# rely on an inline "audited as of <date>" comment — those drift silently.
# Incident that motivated the guard: QNT-59 (Phase 5) removed OLLAMA_API_KEY
# and ANTHROPIC_API_KEY from Settings but left both here; DockerRunLauncher
# then dropped every queued run at launch time for ~20h before detection.
run_launcher:
  module: dagster_docker
  class: DockerRunLauncher
  config:
    network: equity-data-agent_default
    env_vars:
      - ENV
      - DAGSTER_HOME
      - CLICKHOUSE_HOST
      - CLICKHOUSE_PORT
      - QDRANT_URL
      - QDRANT_API_KEY
      - LITELLM_BASE_URL
      - LANGFUSE_PUBLIC_KEY
      - LANGFUSE_SECRET_KEY
      - LANGFUSE_BASE_URL
      - SENTRY_DSN
      - FINNHUB_API_KEY
    # Run-worker containers must see the SAME SQLite-backed run storage the
    # daemon wrote to, or `dagster api execute_run` errors with
    # `Run with id '<x>' not found for run execution` (observed on dev smoke
    # before this mount was added). The shared dagster_home named volume is
    # mounted on top of the worker's /dagster_home; worker reads the same
    # SQLite run-storage DB + event log as the daemon.
    #
    # The volume name is HOST-KNOWN because the daemon calls Docker's API on
    # the host socket — run-worker containers are sibling containers of the
    # daemon, not children. `equity-data-agent_dagster_home` is the
    # compose-generated name (project prefix + volume key); if the compose
    # project name changes, this must change with it.
    #
    # Workers don't need dagster.yaml — they execute a specific run, not the
    # run-launcher or run-monitoring daemons. Dagster's default instance
    # config (sqlite at DAGSTER_HOME) matches what this file configures for
    # storage, so the worker's view of storage is consistent with the daemon's.
    #
    # QNT-167: auto_remove deletes the run-worker container at exit. Without
    # this, every materialisation leaves an Exited container behind — 1080
    # accumulated on prod between QNT-116 (May 1) and QNT-167 (May 3),
    # consuming 52 GB and pushing /dev/sda1 over the HostDiskHigh 80% alert.
    #
    # Race with run_monitoring (poll_interval_seconds=120, max_resume=0): when
    # a worker exits and Docker auto-removes the container, the daemon's next
    # check_run_worker_health() returns NOT_FOUND. monitor_started_run handles
    # this at dagster/_daemon/monitoring/run_monitoring.py:125 — it re-fetches
    # the run state and bails ("disregarding for now") if the worker already
    # transitioned to SUCCESS. So a successful run is NOT mismarked FAILED.
    #
    # What IS lost on auto_remove: container-level forensic state (the
    # State.OOMKilled flag, exit code, last container logs as captured by
    # `docker inspect`). Logs themselves are preserved in Dagster's SQLite
    # event log on the dagster_home volume, kernel-OOM events are still
    # captured by QNT-101 docker-events-notify, and per-container memory is
    # in cAdvisor (QNT-103). The lossy bit is the post-mortem `docker
    # inspect` path — acceptable trade for not flooding the host with
    # 1000+ Exited containers.
    container_kwargs:
      auto_remove: true
      volumes:
        - equity-data-agent_dagster_home:/dagster_home

# QNT-113: cap concurrent runs to protect the daemon cgroup from fan-out OOM.
# Apr 20 incident: a 10-partition `fundamentals_weekly_job` backfill launched
# all 10 subprocess workers at once (DefaultRunCoordinator fires immediately);
# each worker loads the full repo + does asset materialization (peak ~360 MB
# RSS per worker during __ASSET_JOB, revised up from the original 150 MB
# estimate after the Apr 21 OOM — see QNT-115), and the combined load blew
# past the daemon's cgroup so the kernel OOM-killed multiple workers.
# max_concurrent_runs=3 keeps peak usage at ~1.74 GB (daemon baseline ~260 MB
# + sensor-tick headroom ~400 MB + 3 × 360 MB) under the 3 GB cgroup set in
# docker-compose.yml (QNT-115 raised 2g → 3g for headroom).
# If `mem_limit` on dagster-daemon is raised, this can be raised in proportion.
#
# QNT-114: reserve a non-backfill slot so sensors (ohlcv, fundamentals, news)
# can't be starved by a 3-partition backfill. With max_concurrent_runs=3 and a
# backfill limit of 2, at most 2 backfill runs dequeue at once, leaving >=1
# slot free for sensor-triggered work. `dagster/backfill` is a system tag set
# by the backfill daemon on every backfill-launched run.
run_coordinator:
  module: dagster._core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 3
    tag_concurrency_limits:
      - key: "dagster/backfill"
        limit: 2

# QNT-114: auto-reconcile orphaned STARTED/CANCELING runs after a run-worker
# dies without emitting RUN_FAILURE (kernel OOM-kill of a subprocess is the
# canonical case — Apr 21 AMZN backfill incident). Without run_monitoring,
# these runs stay in STARTED forever, the queue-coordinator keeps counting
# them against max_concurrent_runs, and the backfill daemon keeps relaunching
# the same partition, producing additional ghost slots.
#
# Three orphan classes are covered by three different code paths (see
# docs/guides/ops-runbook.md → "CANCELING ghost after run-worker OOM" for the
# full table):
#
#   * STARTING never-launched → monitor_starting_run, ~3 min via
#     start_timeout_seconds. Launcher-independent.
#   * CANCELING stuck (operator Terminate, worker dead so no ack comes back —
#     this was the Apr 21 AMZN incident) → monitor_canceling_run, ~3 min via
#     cancel_timeout_seconds. Launcher-independent.
#   * STARTED worker died, no Terminate (separate class) → monitor_started_run.
#     Container-aware launchers (DockerRunLauncher, K8sRunLauncher) get per-
#     worker health checks (~2 min). DefaultRunLauncher returns
#     supports_check_run_worker_health = False, so the health branch is
#     SKIPPED and only max_runtime_seconds fires (~30 min).
#
# QNT-116: we're now on DockerRunLauncher (run_launcher block above), so the
# per-worker health branch of monitor_started_run is active — STARTED-orphan
# recovery collapses from ~30 min (max_runtime_seconds fallback) to ~2 min
# (container health check on poll_interval_seconds). The 1800s
# max_runtime_seconds timeout stays as a floor for legitimately long-running
# ops, not as the primary recovery path.
# Per-job tighter timeouts can be set via the `dagster/max_runtime_seconds`
# tag.
#
# max_resume_run_attempts: 0 means Dagster fails orphans instead of resuming
# them — we want loud failures, not silent auto-retry of already-OOM'd work.
# Per-job retry is opt-in via QNT-110's `dagster/max_retries` tag.
run_monitoring:
  enabled: true
  poll_interval_seconds: 120
  start_timeout_seconds: 180
  cancel_timeout_seconds: 180
  max_runtime_seconds: 1800
  max_resume_run_attempts: 0
  free_slots_after_run_end_seconds: 0

# QNT-110: re-launch failed runs on transient system/launch failures
# (e.g. gRPC UNAVAILABLE when the code-server container is mid-restart during
# deploy). Per-job opt-in via the `dagster/max_retries` tag — see
# packages/dagster-pipelines/src/dagster_pipelines/retry.py and docs/patterns.md.
#
# retry_on_asset_or_op_failure: false ensures only LAUNCH-level failures retry.
# User errors inside ops continue to fail loud — a real bug in an asset should
# not silently retry (op-level retry is scoped separately via RetryPolicy).
run_retries:
  enabled: true
  max_retries: 0  # default 0; jobs opt in via `dagster/max_retries` tag
  retry_on_asset_or_op_failure: false
