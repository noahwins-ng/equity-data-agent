# QNT-116: pin the compose project name. Compose's auto-inferred project name
# is the working-directory basename, which means renaming the repo checkout
# (or `docker compose -p <other>`, or `COMPOSE_PROJECT_NAME=<other>`) silently
# changes the generated network + volume names (`<project>_default`,
# `<project>_dagster_home`). `dagster.yaml`'s `run_launcher.config.network`
# and `container_kwargs.volumes` hardcode the `equity-data-agent_*` prefix
# so DockerRunLauncher can address the right network/volume when spawning
# run-worker containers. Pinning the project name here makes that invariant
# declarative rather than a convention; mismatched names fail loudly at
# compose-parse time, not silently at run-launch time.
name: equity-data-agent

# Shared logging config — compose-level (per-container) json-file rotation.
# Applied on next container recreation via normal CD; no dockerd restart needed.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Shared ──────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # QNT-169: cap retention on system.text_log / trace_log / metric_log /
      # asynchronous_metric_log to 7d. Without this, system tables grow
      # unbounded and background merges dominate clickhouse-1 CPU.
      - ./clickhouse/config.d/system-log-ttl.xml:/etc/clickhouse-server/config.d/system-log-ttl.xml:ro
    ports:
      - "8123:8123"  # exposed for local dev; blocked by Hetzner firewall in prod
    mem_limit: 8g
    mem_reservation: 2g
    cpus: 2.0
    logging: *default-logging
    healthcheck:
      # Use 127.0.0.1 (not localhost) — busybox wget tries ::1 first and CH binds IPv4-only.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [dev, prod]

  # ── Prod-only services ───────────────────────────────────────────────────────
  # QNT-116: split into three services per Dagster's canonical production
  # topology (https://docs.dagster.io/deployment/oss/deployment-options/docker).
  #   * dagster-code-server: loads user code, serves gRPC on :4000
  #   * dagster (webserver): UI on :3000, talks to code-server via gRPC
  #   * dagster-daemon: scheduler/sensor/backfill/run-launcher, also via gRPC
  # All three share the same image so `docker build` runs once. The explicit
  # `image:` name is required so DAGSTER_CURRENT_IMAGE below matches what
  # DockerRunLauncher (Phase 2) will hand to ephemeral run-worker containers.
  dagster-code-server:
    build:
      context: .
      target: dagster
    image: equity-data-agent-dagster:latest
    restart: unless-stopped
    # QNT-104: opt into autoheal sidecar — this is a long-running service with
    # a HEALTHCHECK whose process can wedge without crashing. autoheal kills
    # the container on `unhealthy` and `restart: unless-stopped` brings it back.
    labels:
      autoheal: "true"
    command: /app/.venv/bin/dagster code-server start -h 0.0.0.0 -p 4000 -m dagster_pipelines.definitions
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
      # Consumed by DockerRunLauncher (Phase 2) — the code server registers
      # this image name with Dagster at startup, and the daemon's run launcher
      # uses it when spawning ephemeral run-worker containers.
      - DAGSTER_CURRENT_IMAGE=equity-data-agent-dagster:latest
    volumes:
      - dagster_home:/dagster_home
      - ./dagster.yaml:/dagster_home/dagster.yaml:ro
    depends_on: [clickhouse]
    # Isolated from the daemon cgroup — user-code imports (pandas, yfinance,
    # sentence-transformers via qdrant-client, etc.) peaked at ~360 MB RSS
    # in QNT-115. 2g gives ~5x headroom for concurrent schedule/sensor
    # in-process evaluation that previously ran in the daemon cgroup.
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 1.0
    logging: *default-logging
    healthcheck:
      # Canonical Dagster gRPC health-probe (from Dagster's docker-compose
      # reference). Returns 0 once the code location has loaded and is ready
      # to serve definitions over gRPC.
      test: ["CMD-SHELL", "/app/.venv/bin/dagster api grpc-health-check -p 4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # user-code load can take ~30-60s (pandas, yfinance, etc.)
    profiles: [prod]

  dagster:
    build:
      context: .
      target: dagster
    image: equity-data-agent-dagster:latest
    restart: unless-stopped
    labels:
      autoheal: "true"  # QNT-104
    # QNT-116: drop -m (no longer loads user code in-process); read the
    # workspace file to reach the code server via gRPC.
    command: /app/.venv/bin/dagster-webserver -w /app/workspace.yaml -h 0.0.0.0 -p 3000
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
      # QNT-112: bind-mount the repo's dagster.yaml on top of the named volume
      # so `git pull` on every deploy reaches the container. The named volume
      # holds Dagster-managed *state* (history, schedules, storage) that must
      # persist; dagster.yaml is *config* and belongs in the repo.
      - ./dagster.yaml:/dagster_home/dagster.yaml:ro
      # QNT-116: workspace.yaml lives at /app (image WORKDIR), NOT under
      # /dagster_home. Bind-mounting a file into a path that's also backed
      # by a shared named volume (dagster_home) produces a Docker mountpoint
      # race when multiple services use the same volume: the second service
      # fails with "make mountpoint: file exists". /app is not a named volume
      # so each service gets an independent bind-mount.
      - ./workspace.yaml:/app/workspace.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"  # bound to loopback only; reach via SSH tunnel
    depends_on:
      clickhouse:
        condition: service_started
      # Wait for code-server HEALTHY (not just started) so that the code-server
      # has completed SQLite schedule-storage alembic init before the webserver
      # touches the shared dagster_home volume. On a fresh volume, simultaneous
      # first-boot of three services produces an "alembic_version has more than
      # one head" error; staggering via service_healthy avoids it.
      dagster-code-server:
        condition: service_healthy
    # QNT-116: 2g → 1g. Webserver no longer imports user code (QNT-115's
    # ~360 MB peak moved to dagster-code-server).
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  dagster-daemon:
    build:
      context: .
      target: dagster
    image: equity-data-agent-dagster:latest
    restart: unless-stopped
    labels:
      autoheal: "true"  # QNT-104
    # QNT-116: drop -m; read workspace.yaml to reach code-server over gRPC.
    command: /app/.venv/bin/dagster-daemon run -w /app/workspace.yaml
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
      # QNT-112: bind-mount dagster.yaml on top of the named volume (same
      # reason as dagster service — config edits in repo must reach both
      # the webserver and the daemon since both read DAGSTER_HOME/dagster.yaml).
      - ./dagster.yaml:/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/app/workspace.yaml:ro
      # QNT-116 Phase 2: DockerRunLauncher spawns ephemeral run-worker
      # containers via the Docker API. Trust boundary: the daemon gets full
      # Docker control on the host — see docs/guides/ops-runbook.md security
      # section. Mitigation: daemon image is ours, not third-party.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      clickhouse:
        condition: service_started
      dagster-code-server:
        condition: service_healthy
    # QNT-116: 3g → 512m. The daemon process alone is ~100-200 MiB (cron-like
    # scheduler + sensor tick loop + queue coordinator). User code is now
    # isolated in dagster-code-server (2g) and ephemeral run-worker containers
    # (launched via DockerRunLauncher, not counted against this cgroup).
    # Historical trail retained for incident archaeology:
    #   QNT-100: 1g initial; QNT-111: 1g→2g (Apr 20 OOM); QNT-115: 2g→3g (Apr 21 OOM);
    #   QNT-116: 3g→512m (topology split — daemon no longer spawns user-code subprocesses).
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    logging: *default-logging
    # Process-check — slim images have no pgrep/ps, so read /proc/1/cmdline directly.
    healthcheck:
      test: ["CMD-SHELL", "grep -q dagster-daemon /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    labels:
      autoheal: "true"  # QNT-104
    command: /app/.venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # Deploy identity for /health — CD sets GIT_SHA before `compose up`
      # (see .github/workflows/deploy.yml). Defaults to "unknown" for local dev
      # where compose isn't the entry point.
      - GIT_SHA=${GIT_SHA:-unknown}
    depends_on: [clickhouse]
    ports:
      # QNT-75: bound to loopback only — public ingress is via cloudflared (see
      # `cloudflared` service below). Localhost binding keeps the host-side
      # health monitor (scripts/health-monitor.sh) working without exposing
      # :8000 to the internet.
      - "127.0.0.1:8000:8000"
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.5
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  litellm:
    image: litellm/litellm:v1.81.14-stable
    restart: unless-stopped
    labels:
      autoheal: "true"  # QNT-104
    command: --config /app/config.yaml --port 4000
    env_file: .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    # Port 4000 intentionally NOT exposed — services call http://litellm:4000 internally
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.25
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  # QNT-104: autoheal sidecar — watches every container labeled `autoheal=true`
  # and issues a Docker `kill` on its main process when its HEALTHCHECK
  # transitions to `unhealthy`. Combined with `restart: unless-stopped` on the
  # target service, this closes the "sick but still up" gap: a deadlocked or
  # stuck process that fails healthchecks but never exits would otherwise sit
  # in the unhealthy state forever — `restart: unless-stopped` only fires on
  # non-zero container exit, never on a HEALTHCHECK reporting `unhealthy`.
  #
  # Coverage split with QNT-116 / ADR-010:
  #   * Run-worker containers (DockerRunLauncher) → covered by Dagster's own
  #     per-run health check (~2 min STARTED-orphan recovery via
  #     supports_check_run_worker_health = True).
  #   * Long-running services (api, dagster-code-server, dagster-daemon,
  #     dagster, litellm) → covered by this sidecar.
  #
  # Trust boundary: same class as the `dagster-daemon` docker.sock mount —
  # documented under "Security notes" in `docs/guides/ops-runbook.md`.
  # `:ro` is socket-file-mode only; the autoheal container can still issue
  # POST /containers/{id}/kill over the socket. The `:ro` is defence-in-depth
  # against the in-container process trying to chmod the socket inode.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      # Default-named label the autoheal binary watches: `autoheal=true`.
      # Setting this to a non-`all` value scopes the monitor to opted-in
      # services only, so e.g. clickhouse / observability containers (which
      # have HEALTHCHECKs but a long natural unhealthy → healthy transition
      # under load) are not subject to kill.
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      # Poll cadence — every healthcheck on the stack is 30s, so polling
      # more frequently than ~10s burns CPU without surfacing kills sooner.
      - AUTOHEAL_INTERVAL=10
      # SIGTERM grace before SIGKILL. Keep short — the container is wedged;
      # we want it gone so `restart: unless-stopped` can bring it back.
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
      - TZ=UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 32m
    mem_reservation: 8m
    cpus: 0.05
    logging: *default-logging
    profiles: [prod]

  # QNT-177 / ADR-018: Cloudflare named tunnel — public HTTPS ingress for the
  # FastAPI service. The tunnel is created in Cloudflare Zero Trust (name
  # `equity-data-agent`) with a Public Hostname mapping `api.<our-domain>` to
  # `http://api:8000`. The connector token in CLOUDFLARE_TUNNEL_TOKEN
  # authenticates this connector to that tunnel; the public hostname and
  # ingress rules are configured dashboard-side, not in the compose flag.
  #
  # The hostname is stable across reboots, image bumps, and container
  # recreations. Replaces the QNT-75 quick-tunnel (`--url http://api:8000`)
  # which rotated on every restart and broke Vercel's build-time env var.
  cloudflared:
    # Pin to a specific version (matches the litellm pin pattern in this file).
    # Bump deliberately by editing this tag — no operational consequence beyond
    # a connector reconnect.
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 64m
    mem_reservation: 16m
    cpus: 0.05
    logging: *default-logging
    profiles: [prod]

  # ── Observability stack (QNT-103) ───────────────────────────────────────────
  # Five services for unified-logs UI + per-container/host metrics + alerting.
  # All admin UIs bound to loopback only — public ingress is via SSH tunnel,
  # same pattern as dagster-webserver (no domain post-QNT-75 / ADR-018).
  # Pre-built dashboards + alert rules are provisioned from ./observability/.

  dozzle:
    image: amir20/dozzle:v8.13.13
    restart: unless-stopped
    volumes:
      # Read-only docker.sock binding — Dozzle only needs read access to tail
      # logs and list containers. NOT mounted rw to keep the trust boundary
      # tight (no container start/stop/exec from the logs UI).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_HOSTNAME=equity-data-agent
    ports:
      # Loopback only — same auth model as dagster (SSH tunnel = auth boundary).
      - "127.0.0.1:8082:8080"
    # QNT-164: 64m -> 192m. Dozzle v8 reactively replays tail logs from every
    # container on UI connect; with 13 prod containers the spike from idle
    # (~39 MiB) past 64 MiB OOM-killed dozzle on first connect post-QNT-103
    # deploy. 192m gives ~5x idle headroom for the connect-time burst.
    mem_limit: 192m
    mem_reservation: 32m
    cpus: 0.05
    logging: *default-logging
    healthcheck:
      # QNT-165: dozzle's distroless image has no /bin/sh, so CMD-SHELL fails
      # with "exec: /bin/sh: no such file or directory" on every check. The
      # binary ships its own healthcheck subcommand that hits /healthcheck
      # over HTTP and exits 0 on 200; use that with CMD exec-form (no shell).
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles: [prod]

  node_exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      # Exclude virtual/container filesystems from disk metrics — keeps
      # Grafana panels and HostDiskHigh alert focused on real volumes.
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    pid: host
    # Scraped via internal compose network (prometheus → node_exporter:9100).
    # Port not exposed on host; reach via SSH tunnel only if needed for debugging.
    mem_limit: 64m
    mem_reservation: 16m
    cpus: 0.05
    logging: *default-logging
    profiles: [prod]

  cadvisor:
    # v0.55.1 (Dec 2025) — bumped from v0.49.1 because the older release
    # hardcoded the legacy `overlay2` storage-driver path layout. Modern
    # Docker (27+) on Ubuntu uses the new `overlayfs` driver; v0.49 fell
    # back to traversing /rootfs/var/lib/docker/image/overlay2/... which
    # didn't exist, errored on every container with "failed to identify
    # the read-write layer ID", and produced metrics with no `name` /
    # `image` labels. v0.56.x exists upstream but isn't published to the
    # gcr.io/cadvisor registry yet (last pushed tag is v0.55.1); pin to
    # the highest tag that actually exists in the registry we use.
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    restart: unless-stopped
    # QNT-103: without explicit flags cAdvisor enumerates every cgroup slice
    # (systemd, init.scope, /system.slice/*.service, etc.) and tries to read
    # docker layer metadata via /rootfs/var/lib/docker, which collides with
    # the rootfs RO mount and silently fails — Containers Overview dashboard
    # ends up empty and per-container alert rules never fire.
    #   --docker_only=true            restrict to Docker containers; cAdvisor
    #                                 uses the Docker API (/var/run/docker.sock)
    #                                 for discovery, which populates the `name`
    #                                 and `image` labels alert rules + dashboards
    #                                 query on.
    #   --store_container_labels=false control label cardinality: don't expose
    #                                 every Docker label as a Prometheus label.
    #   --disable_metrics=disk        disk metrics rely on layerdb introspection
    #                                 (the failing /rootfs/var/lib/docker path);
    #                                 we don't graph per-container disk anyway.
    command:
      - '--docker_only=true'
      - '--store_container_labels=false'
      - '--disable_metrics=disk'
    # `privileged` is required on Ubuntu hosts (Hetzner CX41) so cAdvisor can
    # read cgroup memory accounting from /sys/fs/cgroup. Less-privileged
    # alternatives exist but trip on per-container memory limits.
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Scraped via internal compose network (prometheus → cadvisor:8080).
    # Port not exposed on host; reach via SSH tunnel only if needed for debugging.
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.2
    logging: *default-logging
    profiles: [prod]

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'  # AC: "retains 15d of time-series"
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - cadvisor
      - node_exporter
    mem_limit: 384m
    mem_reservation: 128m
    cpus: 0.25
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles: [prod]

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    env_file: .env  # supplies DISCORD_WEBHOOK_URL for alerting contact-point provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Intentionally NOT setting GF_SECURITY_ADMIN_PASSWORD — Grafana
      # initialises a fresh DB with admin/admin and forces a password change
      # on first login. Setting the env var here would re-apply on every
      # `docker compose up -d`, silently blowing away whatever password the
      # operator set. To rotate, use the UI or `grafana cli admin
      # reset-admin-password` inside the container.
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false
      # Single-host loopback bind — Grafana doesn't need to know about a
      # public root URL; the SSH-tunnelled access on localhost:3030 works
      # with default settings.
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Loopback only — port 3030 (3000 is dev-dagster, 3001 is dev-frontend
      # in dev; in prod the only thing on 3000 is dagster-webserver).
      - "127.0.0.1:3030:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 96m
    cpus: 0.25
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    profiles: [prod]

volumes:
  clickhouse_data:  # persists ClickHouse data — NEVER omit this volume
  prometheus_data:  # 15d of TSDB metrics
  grafana_data:     # Grafana state (changed admin password, modified dashboards)
  dagster_home:     # persists Dagster run history + schedule/sensor cursors across rebuilds;
                    # shared between dagster and dagster-daemon so they see the same state
