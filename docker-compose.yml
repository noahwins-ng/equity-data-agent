services:
  # ── Shared ──────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"  # exposed for local dev; blocked by Hetzner firewall in prod
    deploy:
      resources:
        limits:
          memory: 4G
    profiles: [dev, prod]

  # ── Prod-only services ───────────────────────────────────────────────────────
  dagster:
    build:
      context: .
      target: dagster
    restart: unless-stopped
    command: /app/.venv/bin/dagster-webserver -m dagster_pipelines.definitions -h 0.0.0.0 -p 3000
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
    ports:
      - "127.0.0.1:3000:3000"  # bound to loopback only; reach via SSH tunnel
    depends_on: [clickhouse]
    profiles: [prod]

  dagster-daemon:
    build:
      context: .
      target: dagster
    restart: unless-stopped
    command: /app/.venv/bin/dagster-daemon run -m dagster_pipelines.definitions
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
    depends_on: [clickhouse]
    profiles: [prod]

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    command: /app/.venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # Deploy identity for /health — CD sets GIT_SHA before `compose up`
      # (see .github/workflows/deploy.yml). Defaults to "unknown" for local dev
      # where compose isn't the entry point.
      - GIT_SHA=${GIT_SHA:-unknown}
    depends_on: [clickhouse]
    ports:
      - "8000:8000"  # direct access until domain + Caddy added in Phase 6
    profiles: [prod]

  litellm:
    image: litellm/litellm:v1.56.5
    restart: unless-stopped
    command: --config /app/config.yaml --port 4000
    env_file: .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    # Port 4000 intentionally NOT exposed — services call http://litellm:4000 internally
    profiles: [prod]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on: [api]
    profiles: [prod]

volumes:
  clickhouse_data:  # persists ClickHouse data — NEVER omit this volume
  caddy_data:       # persists TLS certificates across restarts
  dagster_home:     # persists Dagster run history + schedule/sensor cursors across rebuilds;
                    # shared between dagster and dagster-daemon so they see the same state
