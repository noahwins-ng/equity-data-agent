# Shared logging config — compose-level (per-container) json-file rotation.
# Applied on next container recreation via normal CD; no dockerd restart needed.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Shared ──────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"  # exposed for local dev; blocked by Hetzner firewall in prod
    mem_limit: 8g
    mem_reservation: 2g
    cpus: 2.0
    logging: *default-logging
    healthcheck:
      # Use 127.0.0.1 (not localhost) — busybox wget tries ::1 first and CH binds IPv4-only.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [dev, prod]

  # ── Prod-only services ───────────────────────────────────────────────────────
  dagster:
    build:
      context: .
      target: dagster
    restart: unless-stopped
    command: /app/.venv/bin/dagster-webserver -m dagster_pipelines.definitions -h 0.0.0.0 -p 3000
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
      # QNT-112: bind-mount the repo's dagster.yaml on top of the named volume
      # so `git pull` on every deploy reaches the container. The named volume
      # holds Dagster-managed *state* (history, schedules, storage) that must
      # persist; dagster.yaml is *config* and belongs in the repo.
      - ./dagster.yaml:/dagster_home/dagster.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"  # bound to loopback only; reach via SSH tunnel
    depends_on: [clickhouse]
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  dagster-daemon:
    build:
      context: .
      target: dagster
    restart: unless-stopped
    command: /app/.venv/bin/dagster-daemon run -m dagster_pipelines.definitions
    env_file: .env
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster_home:/dagster_home
      # QNT-112: bind-mount dagster.yaml on top of the named volume (same
      # reason as dagster service — config edits in repo must reach both
      # the webserver and the daemon since both read DAGSTER_HOME/dagster.yaml).
      - ./dagster.yaml:/dagster_home/dagster.yaml:ro
    depends_on: [clickhouse]
    # QNT-111: bumped 1g → 2g after Apr 20 02:00 UTC OOM cascade during
    # weekly fundamentals schedule tick. The 1g cgroup limit (set by QNT-100)
    # was blown out by concurrent partition-launcher subprocesses; kernel
    # OOM-killed 4+ python processes in 2 min, killed 7 runs before launch.
    # QNT-113 then capped run concurrency in dagster.yaml so 2g is sufficient
    # even under a 10-partition backfill (without it, the Apr 20 13:22 UTC
    # backfill re-OOM'd the 2g cgroup by launching 10 workers at once).
    # QNT-115: bumped 2g → 3g after Apr 21 12:22/12:48 UTC OOM-kills during
    # a 3-partition __ASSET_JOB backfill. The QNT-113 sizing math assumed
    # 150 MB/worker but observed per-worker peak is ~360 MB, so real peak
    # 660 + 3*360 = 1740 MB was at 87% of the 2 GiB limit with no headroom.
    # 3g leaves ~1.3 GiB headroom at max_concurrent_runs=3 (still unchanged).
    # QNT-104 owns the comprehensive resource-limit audit + autoheal sidecar.
    mem_limit: 3g
    mem_reservation: 256m
    cpus: 0.5
    logging: *default-logging
    # Process-check — slim images have no pgrep/ps, so read /proc/1/cmdline directly.
    healthcheck:
      test: ["CMD-SHELL", "grep -q dagster-daemon /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    command: /app/.venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # Deploy identity for /health — CD sets GIT_SHA before `compose up`
      # (see .github/workflows/deploy.yml). Defaults to "unknown" for local dev
      # where compose isn't the entry point.
      - GIT_SHA=${GIT_SHA:-unknown}
    depends_on: [clickhouse]
    ports:
      - "8000:8000"  # direct access until domain + Caddy added in Phase 6
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.5
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  litellm:
    image: litellm/litellm:v1.56.5
    restart: unless-stopped
    command: --config /app/config.yaml --port 4000
    env_file: .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    # Port 4000 intentionally NOT exposed — services call http://litellm:4000 internally
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.25
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on: [api]
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.1
    logging: *default-logging
    healthcheck:
      # Use 127.0.0.1 (not localhost) — busybox wget tries ::1 first and Caddy admin binds IPv4-only.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [prod]

volumes:
  clickhouse_data:  # persists ClickHouse data — NEVER omit this volume
  caddy_data:       # persists TLS certificates across restarts
  dagster_home:     # persists Dagster run history + schedule/sensor cursors across rebuilds;
                    # shared between dagster and dagster-daemon so they see the same state
